<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klassekart – Clashroom</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --ink:    #0f0f1a;
    --paper:  #f0ede6;
    --purple: #6c31e3;
    --pdim:   rgba(108,49,227,0.14);
    --pbord:  rgba(108,49,227,0.35);
    --gold:   #f5a623;
    --green:  #2a9d5c;
    --red:    #e63946;
    --card:   #1a1a2e;
    --border: rgba(255,255,255,0.08);
    --muted:  #6b6b80;
  }

  * { box-sizing:border-box; margin:0; padding:0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--ink);
    color: var(--paper);
    min-height: 100vh;
  }

  header {
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: rgba(15,15,26,0.97);
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.15rem; letter-spacing:-0.03em; text-decoration:none; color:var(--paper); }
  .logo span { color:var(--purple); }

  .header-right { display:flex; align-items:center; gap:10px; }

  .lang-btn {
    display:flex; align-items:center; gap:5px;
    background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12);
    color:var(--paper); padding:5px 11px; border-radius:20px;
    font-size:0.77rem; font-family:'DM Sans',sans-serif; font-weight:600;
    cursor:pointer; transition:background 0.15s; white-space:nowrap;
  }
  .lang-btn:hover { background:rgba(255,255,255,0.13); }

  .main { display:flex; gap:0; min-height:calc(100vh - 57px); }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--card);
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
  }

  .sidebar h2 { font-family:'Syne',sans-serif; font-weight:800; font-size:1.1rem; letter-spacing:-0.03em; }

  label { font-size:0.78rem; font-weight:600; color:var(--muted); display:block; margin-bottom:5px; }

  textarea {
    width:100%;
    height:130px;
    background:rgba(255,255,255,0.05);
    border:2px solid rgba(255,255,255,0.1);
    border-radius:11px;
    color:var(--paper);
    font-family:'DM Sans',sans-serif;
    font-size:0.85rem;
    padding:10px 12px;
    resize:vertical;
    outline:none;
    transition:border-color 0.2s;
  }
  textarea:focus { border-color:var(--purple); }
  textarea::placeholder { color:var(--muted); }

  .info-chip {
    font-size:0.73rem; color:var(--muted); background:rgba(255,255,255,0.04);
    border:1px solid var(--border); border-radius:8px; padding:6px 10px;
    display:flex; justify-content:space-between;
  }
  .info-chip span { color:var(--paper); font-weight:700; font-family:'DM Mono',monospace; }

  .layout-select { display:flex; gap:6px; }
  .layout-btn {
    flex:1; padding:8px 5px; border-radius:9px;
    border:2px solid rgba(255,255,255,0.1);
    background:transparent; color:var(--muted);
    font-size:0.78rem; font-family:'Syne',sans-serif; font-weight:700;
    cursor:pointer; transition:all 0.2s; text-align:center;
  }
  .layout-btn.active { border-color:var(--purple); background:var(--pdim); color:var(--paper); }

  button.action {
    width:100%; padding:12px; border-radius:11px; border:none;
    font-family:'Syne',sans-serif; font-weight:800; font-size:0.9rem;
    cursor:pointer; transition:opacity 0.15s, transform 0.1s;
  }
  button.action:hover { opacity:0.88; transform:translateY(-1px); }
  button.action:active { transform:translateY(0); }
  .btn-purple { background:var(--purple); color:white; }
  .btn-outline { background:transparent; color:var(--paper); border:1px solid var(--border); }

  .constraint-list { display:flex; flex-direction:column; gap:5px; max-height:120px; overflow-y:auto; }
  .constraint-item {
    display:flex; align-items:center; gap:7px;
    background:rgba(255,255,255,0.04); border:1px solid var(--border);
    border-radius:8px; padding:6px 10px; font-size:0.78rem;
  }
  .constraint-item .names { flex:1; }
  .constraint-remove { background:none; border:none; color:var(--red); cursor:pointer; font-size:0.85rem; padding:0; width:auto; }
  .add-constraint-row { display:flex; gap:5px; }
  .add-constraint-row input {
    flex:1; padding:7px 10px; border-radius:9px;
    border:2px solid rgba(255,255,255,0.1);
    background:rgba(255,255,255,0.05);
    color:var(--paper); font-size:0.82rem;
    font-family:'DM Sans',sans-serif; outline:none; transition:border-color 0.2s;
  }
  .add-constraint-row input:focus { border-color:var(--purple); }
  .add-constraint-row input::placeholder { color:var(--muted); }
  .add-constraint-row button {
    width:auto; padding:7px 13px; background:var(--purple); color:white;
    border:none; border-radius:9px; font-family:'Syne',sans-serif; font-weight:700;
    font-size:0.82rem; cursor:pointer;
  }

  /* ── CANVAS ── */
  .canvas-area {
    flex:1; padding:24px; display:flex; flex-direction:column; gap:16px; overflow-y:auto;
  }

  .canvas-header {
    display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
  }
  .canvas-title { font-family:'Syne',sans-serif; font-weight:800; font-size:1.15rem; letter-spacing:-0.03em; }

  .canvas-actions { display:flex; gap:8px; flex-wrap:wrap; }
  .canvas-actions button {
    width:auto; padding:8px 16px; border-radius:10px; border:none;
    font-family:'Syne',sans-serif; font-weight:700; font-size:0.8rem;
    cursor:pointer; transition:opacity 0.15s;
  }
  .canvas-actions button:hover { opacity:0.85; }
  .btn-regen { background:var(--purple); color:white; }
  .btn-print { background:rgba(255,255,255,0.1); color:var(--paper); border:1px solid var(--border)!important; }

  .empty-state {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; text-align:center; padding:40px 20px;
  }
  .empty-state .icon { font-size:3.5rem; }
  .empty-state h3 { font-family:'Syne',sans-serif; font-weight:800; font-size:1.3rem; }
  .empty-state p { color:var(--muted); font-size:0.88rem; max-width:280px; line-height:1.55; }

  .board-wrap { overflow-x:auto; }

  .seat-grid {
    display:grid; gap:8px;
    width:fit-content; min-width:100%;
  }

  .desk {
    background:var(--card);
    border:2px solid var(--border);
    border-radius:12px;
    padding:10px 8px;
    text-align:center;
    font-size:0.78rem;
    font-weight:600;
    min-width:80px;
    min-height:54px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:4px;
    transition:border-color 0.2s, background 0.2s;
    cursor:default;
    user-select:none;
    position:relative;
  }
  .desk.occupied { border-color:rgba(108,49,227,0.4); background:rgba(108,49,227,0.08); }
  .desk.empty-desk { border-style:dashed; }
  .desk .av {
    width:28px; height:28px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:0.72rem; font-weight:800; color:white; flex-shrink:0;
  }
  .desk .dname { font-size:0.7rem; line-height:1.2; word-break:break-word; }
  .desk .seat-num {
    position:absolute; top:4px; right:6px;
    font-family:'DM Mono',monospace; font-size:0.6rem; color:var(--muted);
  }

  .teacher-row {
    width:100%; max-width:260px;
    background:rgba(245,166,35,0.1); border:2px solid rgba(245,166,35,0.35);
    border-radius:10px; padding:8px 18px;
    text-align:center; font-family:'Syne',sans-serif; font-weight:800; font-size:0.82rem;
    color:var(--gold); margin:0 auto 6px;
    letter-spacing:0.04em;
  }

  .board-sym {
    width:100%; max-width:360px;
    background:rgba(255,255,255,0.04); border:1px solid var(--border);
    border-radius:8px; padding:6px; text-align:center;
    font-size:0.72rem; color:var(--muted); margin:0 auto 6px;
    letter-spacing:0.08em; text-transform:uppercase;
  }

  .constraint-warn {
    display:none; padding:10px 14px; border-radius:10px;
    background:rgba(230,57,70,0.12); border:1px solid rgba(230,57,70,0.35);
    color:#ff8a93; font-size:0.78rem;
  }
  .constraint-warn.show { display:block; }

  .divider { height:1px; background:var(--border); }

  /* PRINT STYLES */
  @media print {
    body { background:white; color:black; }
    header, .sidebar, .canvas-actions, .constraint-warn { display:none!important; }
    .main { display:block; }
    .canvas-area { padding:10px; }
    .desk { border:1px solid #ccc; background:#fafafa; color:black; }
    .desk.occupied { border-color:#6c31e3; background:#f3eeff; }
    .teacher-row { background:#fff8e7; border-color:#f5a623; color:#b07a00; }
    .board-sym { background:#f5f5f5; color:#888; }
    .desk .av { color:white; }
    .desk .dname { color:black; }
    .seat-num { color:#aaa; }
  }

  @media (max-width:700px) {
    .main { flex-direction:column; }
    .sidebar { width:100%; border-right:none; border-bottom:1px solid var(--border); }
    .desk { min-width:60px; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">Klasse<span>kart</span> 🪑</a>
  <div class="header-right">
    <button class="lang-btn" onclick="toggleLang()">
      <span id="lang-flag">🇳🇴</span>
      <span id="lang-txt">Norsk</span>
    </button>
  </div>
</header>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2 id="t-sidebar-title">Klassekart</h2>

    <div>
      <label id="t-names-label">Elevnavn (ett per linje)</label>
      <textarea id="names-input" id="t-names-ph" placeholder="Ola&#10;Kari&#10;Mohammed&#10;Sofia&#10;..."></textarea>
    </div>

    <div class="info-chip">
      <span id="t-count-label">Elever</span>
      <span id="count-display">0</span>
    </div>

    <div>
      <label id="t-layout-label">Oppsett</label>
      <div class="layout-select">
        <button class="layout-btn active" onclick="setLayout('pairs')"  id="layout-pairs">Par</button>
        <button class="layout-btn"        onclick="setLayout('rows')"   id="layout-rows">Rader</button>
        <button class="layout-btn"        onclick="setLayout('groups')" id="layout-groups">Grupper</button>
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <label id="t-constraint-label">Kan ikke sitte sammen</label>
      <div class="add-constraint-row">
        <input type="text" id="c-name1" id="t-c1-ph" placeholder="Elev A" />
        <input type="text" id="c-name2" id="t-c2-ph" placeholder="Elev B" />
        <button onclick="addConstraint()" id="t-c-add">+</button>
      </div>
      <div class="constraint-list" id="constraint-list" style="margin-top:8px;"></div>
    </div>

    <div class="divider"></div>

    <button class="action btn-purple" onclick="generate()" id="t-generate-btn">🔀 Generer kart</button>
    <button class="action btn-outline" onclick="clearAll()" id="t-clear-btn">Nullstill alt</button>
  </div>

  <!-- CANVAS -->
  <div class="canvas-area">
    <div class="canvas-header">
      <div class="canvas-title" id="t-canvas-title">Sittekart</div>
      <div class="canvas-actions">
        <button class="btn-regen" onclick="generate()" id="t-regen-btn">🔀 Ny plassering</button>
        <button class="btn-print" onclick="window.print()" id="t-print-btn">🖨 Skriv ut</button>
      </div>
    </div>
    <div class="constraint-warn" id="constraint-warn"></div>
    <div class="board-wrap" id="board-wrap">
      <div class="empty-state" id="empty-state">
        <div class="icon">🪑</div>
        <h3 id="t-empty-title">Ingen elever enda</h3>
        <p id="t-empty-desc">Lim inn elevnavn til venstre og trykk "Generer kart" for å se sitteplassene.</p>
      </div>
    </div>
  </div>
</div>

<script>
// ─── TRANSLATIONS ─────────────────────────────────────────────
const LANG = {
  no: {
    sidebar_title:    "Klassekart",
    names_label:      "Elevnavn (ett per linje)",
    names_ph:         "Ola\nKari\nMohammed\nSofia\n...",
    count_label:      "Elever",
    layout_label:     "Oppsett",
    layout_pairs:     "Par",
    layout_rows:      "Rader",
    layout_groups:    "Grupper",
    constraint_label: "Kan ikke sitte sammen",
    c1_ph:            "Elev A",
    c2_ph:            "Elev B",
    c_add:            "+",
    generate_btn:     "🔀 Generer kart",
    clear_btn:        "Nullstill alt",
    canvas_title:     "Sittekart",
    regen_btn:        "🔀 Ny plassering",
    print_btn:        "🖨 Skriv ut",
    empty_title:      "Ingen elever enda",
    empty_desc:       "Lim inn elevnavn til venstre og trykk «Generer kart» for å se sitteplassene.",
    teacher_label:    "LÆRER",
    board_label:      "TAVLE",
    empty_seat:       "Ledig",
    warn_too_few:     n => `${n} elever er for få til dette oppsettet. Prøv et annet.`,
    warn_conflict:    pairs => `Klarte ikke å oppfylle alle begrensninger: ${pairs}`,
    warn_max:         "Maks 32 elever. Resten ble ignorert.",
  },
  en: {
    sidebar_title:    "Seating Chart",
    names_label:      "Student names (one per line)",
    names_ph:         "Alice\nBob\nCharlie\nDiana\n...",
    count_label:      "Students",
    layout_pairs:     "Pairs",
    layout_rows:      "Rows",
    layout_groups:    "Groups",
    constraint_label: "Can't sit together",
    c1_ph:            "Student A",
    c2_ph:            "Student B",
    c_add:            "+",
    generate_btn:     "🔀 Generate chart",
    clear_btn:        "Reset everything",
    canvas_title:     "Seating Chart",
    regen_btn:        "🔀 New arrangement",
    print_btn:        "🖨 Print",
    empty_title:      "No students yet",
    empty_desc:       "Paste student names on the left and click «Generate chart» to see the seating.",
    teacher_label:    "TEACHER",
    board_label:      "BOARD",
    empty_seat:       "Empty",
    warn_too_few:     n => `${n} students is too few for this layout. Try a different one.`,
    warn_conflict:    pairs => `Could not satisfy all constraints: ${pairs}`,
    warn_max:         "Max 32 students. The rest were ignored.",
  }
};

let lang = localStorage.getItem('clashroom_lang') || 'no';
const L = () => LANG[lang];

function applyLang() {
  document.documentElement.lang = lang;
  document.getElementById('lang-flag').textContent = lang === 'no' ? '🇳🇴' : '🇬🇧';
  document.getElementById('lang-txt').textContent  = lang === 'no' ? 'Norsk' : 'English';
  const t = (id, v) => { const e=document.getElementById(id); if(e) e.textContent=v; };
  const p = (id, v) => { const e=document.getElementById(id); if(e) e.placeholder=v; };
  t('t-sidebar-title',    L().sidebar_title);
  t('t-names-label',      L().names_label);
  p('names-input',        L().names_ph);
  t('t-count-label',      L().count_label);
  t('t-layout-label',     L().layout_label);
  t('layout-pairs',       L().layout_pairs);
  t('layout-rows',        L().layout_rows);
  t('layout-groups',      L().layout_groups);
  t('t-constraint-label', L().constraint_label);
  p('c-name1',            L().c1_ph);
  p('c-name2',            L().c2_ph);
  t('t-c-add',            L().c_add);
  t('t-generate-btn',     L().generate_btn);
  t('t-clear-btn',        L().clear_btn);
  t('t-canvas-title',     L().canvas_title);
  t('t-regen-btn',        L().regen_btn);
  t('t-print-btn',        L().print_btn);
  t('t-empty-title',      L().empty_title);
  t('t-empty-desc',       L().empty_desc);
}

function toggleLang() {
  lang = lang === 'no' ? 'en' : 'no';
  localStorage.setItem('clashroom_lang', lang);
  applyLang();
}

// ─── CONSTANTS ────────────────────────────────────────────────
const COLORS = ['#e63946','#2176ae','#f5a623','#2a9d5c','#9b5de5','#f77f00','#4cc9f0','#0d9488','#ef476f','#06d6a0'];
const MAX_STUDENTS = 32;

// ─── STATE ────────────────────────────────────────────────────
let layout = 'pairs';
let constraints = JSON.parse(localStorage.getItem('kk_constraints') || '[]');
let lastNames = [];

function colorFor(name) {
  let h = 0; for (const c of name) h = c.charCodeAt(0)+((h<<5)-h);
  return COLORS[Math.abs(h) % COLORS.length];
}
function initials(n) {
  return n.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0,2);
}

function setLayout(l) {
  layout = l;
  ['pairs','rows','groups'].forEach(x => document.getElementById('layout-'+x).classList.toggle('active', x===l));
}

// ─── CONSTRAINTS ─────────────────────────────────────────────
function addConstraint() {
  const a = document.getElementById('c-name1').value.trim();
  const b = document.getElementById('c-name2').value.trim();
  if (!a || !b || a.toLowerCase() === b.toLowerCase()) return;
  const key = [a,b].sort().join('|||');
  if (constraints.some(c => c.key === key)) return;
  constraints.push({key, a, b});
  saveConstraints();
  renderConstraints();
  document.getElementById('c-name1').value = '';
  document.getElementById('c-name2').value = '';
}

function removeConstraint(key) {
  constraints = constraints.filter(c => c.key !== key);
  saveConstraints();
  renderConstraints();
}

function saveConstraints() {
  localStorage.setItem('kk_constraints', JSON.stringify(constraints));
}

function renderConstraints() {
  const el = document.getElementById('constraint-list');
  el.innerHTML = '';
  constraints.forEach(c => {
    const div = document.createElement('div');
    div.className = 'constraint-item';
    div.innerHTML = `<span class="names">🚫 ${c.a} + ${c.b}</span><button class="constraint-remove" onclick="removeConstraint('${CSS.escape(c.key)}')">✕</button>`;
    el.appendChild(div);
  });
}

// ─── COUNT UPDATE ─────────────────────────────────────────────
document.getElementById('names-input').addEventListener('input', () => {
  const names = parseNames();
  document.getElementById('count-display').textContent = names.length;
  if (names.length > 0) lastNames = names;
  localStorage.setItem('kk_names', document.getElementById('names-input').value);
});

function parseNames() {
  return document.getElementById('names-input').value
    .split('\n')
    .map(n => n.trim())
    .filter(n => n.length > 0)
    .slice(0, MAX_STUDENTS);
}

// ─── SHUFFLE ─────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// ─── ADJACENT CHECK ──────────────────────────────────────────
function conflictCount(arrangement, colsPerRow) {
  let n = 0;
  const len = arrangement.length;
  for (let i = 0; i < len; i++) {
    const a = arrangement[i]; if (!a) continue;
    const row = Math.floor(i / colsPerRow);
    const col = i % colsPerRow;
    // right neighbour
    if (col < colsPerRow-1 && arrangement[i+1]) {
      const b = arrangement[i+1];
      if (isConstrained(a, b)) n++;
    }
    // below neighbour
    if (i + colsPerRow < len && arrangement[i+colsPerRow]) {
      const b = arrangement[i+colsPerRow];
      if (isConstrained(a, b)) n++;
    }
  }
  return n;
}

function isConstrained(a, b) {
  return constraints.some(c =>
    (c.a.toLowerCase()===a.toLowerCase() && c.b.toLowerCase()===b.toLowerCase()) ||
    (c.a.toLowerCase()===b.toLowerCase() && c.b.toLowerCase()===a.toLowerCase())
  );
}

function bestArrangement(names, cols, maxTries=80) {
  let best = shuffle(names), bestC = conflictCount(best, cols);
  for (let i = 0; i < maxTries && bestC > 0; i++) {
    const attempt = shuffle(names);
    const c = conflictCount(attempt, cols);
    if (c < bestC) { best = attempt; bestC = c; }
  }
  return { arrangement: best, conflicts: bestC };
}

// ─── GENERATE ────────────────────────────────────────────────
function generate() {
  const names = parseNames();
  if (names.length === 0) return;

  const warn = document.getElementById('constraint-warn');
  warn.className = 'constraint-warn';

  let arrangement, cols, rows, cells, conflicts = 0;

  if (layout === 'pairs') {
    cols = 4;
    rows = Math.ceil(names.length / cols);
    const result = bestArrangement(names, cols);
    arrangement = result.arrangement;
    conflicts = result.conflicts;
    cells = cols * rows;
  } else if (layout === 'rows') {
    cols = 6;
    rows = Math.ceil(names.length / cols);
    const result = bestArrangement(names, cols);
    arrangement = result.arrangement;
    conflicts = result.conflicts;
    cells = cols * rows;
  } else {
    // groups of 4
    cols = 4;
    rows = Math.ceil(names.length / cols);
    const result = bestArrangement(names, cols);
    arrangement = result.arrangement;
    conflicts = result.conflicts;
    cells = cols * rows;
  }

  // pad
  while (arrangement.length < cells) arrangement.push(null);

  if (conflicts > 0) {
    const conflictPairs = constraints
      .filter(c => {
        const ai = arrangement.findIndex(n => n && n.toLowerCase()===c.a.toLowerCase());
        const bi = arrangement.findIndex(n => n && n.toLowerCase()===c.b.toLowerCase());
        if (ai < 0 || bi < 0) return false;
        return isAdjacent(ai, bi, cols);
      })
      .map(c => `${c.a}+${c.b}`)
      .join(', ');
    if (conflictPairs) {
      warn.textContent = L().warn_conflict(conflictPairs);
      warn.className = 'constraint-warn show';
    }
  }

  if (names.length > MAX_STUDENTS) {
    warn.textContent = L().warn_max;
    warn.className = 'constraint-warn show';
  }

  renderGrid(arrangement, cols);
  saveState(arrangement);
}

function isAdjacent(i, j, cols) {
  const ri = Math.floor(i/cols), ci = i%cols;
  const rj = Math.floor(j/cols), cj = j%cols;
  return (Math.abs(ri-rj)<=1 && Math.abs(ci-cj)<=1);
}

// ─── RENDER ──────────────────────────────────────────────────
function renderGrid(arrangement, cols) {
  const wrap = document.getElementById('board-wrap');
  wrap.innerHTML = '';

  const boardDiv = document.createElement('div');
  boardDiv.className = 'board-sym';
  boardDiv.id = 't-board-sym';
  boardDiv.textContent = L().board_label;
  wrap.appendChild(boardDiv);

  const teacherDiv = document.createElement('div');
  teacherDiv.className = 'teacher-row';
  teacherDiv.id = 't-teacher-row';
  teacherDiv.textContent = '👩‍🏫 ' + L().teacher_label;
  wrap.appendChild(teacherDiv);

  const grid = document.createElement('div');
  grid.className = 'seat-grid';
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.style.maxWidth = (cols * 92 + (cols-1)*8) + 'px';

  arrangement.forEach((name, idx) => {
    const desk = document.createElement('div');
    if (name) {
      desk.className = 'desk occupied';
      desk.innerHTML = `
        <div class="av" style="background:${colorFor(name)}">${initials(name)}</div>
        <div class="dname">${name}</div>
        <div class="seat-num">${idx+1}</div>`;
    } else {
      desk.className = 'desk empty-desk';
      desk.innerHTML = `<div style="color:var(--muted);font-size:0.7rem;">${L().empty_seat}</div>`;
    }
    grid.appendChild(desk);
  });
  wrap.appendChild(grid);
}

// ─── SAVE/LOAD STATE ─────────────────────────────────────────
function saveState(arr) {
  localStorage.setItem('kk_arrangement', JSON.stringify(arr));
  localStorage.setItem('kk_layout', layout);
}

function loadState() {
  const saved = localStorage.getItem('kk_names');
  if (saved) {
    document.getElementById('names-input').value = saved;
    const names = parseNames();
    document.getElementById('count-display').textContent = names.length;
  }
  const l = localStorage.getItem('kk_layout');
  if (l) setLayout(l);
  const arr = localStorage.getItem('kk_arrangement');
  if (arr) {
    const parsed = JSON.parse(arr);
    const cols = layout === 'rows' ? 6 : 4;
    renderGrid(parsed, cols);
  }
  renderConstraints();
}

function clearAll() {
  document.getElementById('names-input').value = '';
  document.getElementById('count-display').textContent = '0';
  document.getElementById('board-wrap').innerHTML = `
    <div class="empty-state" id="empty-state">
      <div class="icon">🪑</div>
      <h3 id="t-empty-title"></h3>
      <p id="t-empty-desc"></p>
    </div>`;
  document.getElementById('constraint-warn').className = 'constraint-warn';
  localStorage.removeItem('kk_names');
  localStorage.removeItem('kk_arrangement');
  applyLang();
}

// ─── INIT ────────────────────────────────────────────────────
applyLang();
loadState();
</script>
