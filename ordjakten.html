<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ordjakten – Clashroom</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

:root {
  --ink:#0f0f1a; --paper:#f0ede6;
  --accent:#22c55e; --accent-dim:rgba(34,197,94,0.14); --accent-bord:rgba(34,197,94,0.35);
  --gold:#f5a623; --green:#2a9d5c; --red:#e63946;
  --card:#1a1a2e; --border:rgba(255,255,255,0.08); --muted:#6b6b80;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--paper);min-height:100vh;display:flex;flex-direction:column;align-items:center}

header{width:100%;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:rgba(15,15,26,0.97);backdrop-filter:blur(8px);position:sticky;top:0;z-index:100}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem;letter-spacing:-0.03em;text-decoration:none;color:var(--paper)}
.logo span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:10px}
.round-info{font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--muted);background:rgba(255,255,255,0.05);padding:4px 10px;border-radius:20px}
.lang-btn{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:var(--paper);padding:5px 11px;border-radius:20px;font-size:0.77rem;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:background 0.15s;white-space:nowrap}
.lang-btn:hover{background:rgba(255,255,255,0.13)}

.screen{display:none;width:100%;max-width:500px;padding:28px 20px}
.screen.active{display:flex;flex-direction:column;align-items:center;gap:16px}
h1{font-family:'Syne',sans-serif;font-weight:800;font-size:2.1rem;letter-spacing:-0.05em;line-height:1.05;text-align:center}
h1 em{color:var(--accent);font-style:normal}
.sub{color:var(--muted);font-size:0.88rem;text-align:center;line-height:1.55}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%}

input[type="text"]{width:100%;padding:13px 16px;border-radius:11px;border:2px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:var(--paper);font-size:1rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s}
input[type="text"]:focus{border-color:var(--accent)}
input[type="text"]::placeholder{color:var(--muted)}

button{width:100%;padding:13px;border-radius:12px;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:0.93rem;cursor:pointer;transition:opacity 0.15s,transform 0.1s}
button:hover:not(:disabled){opacity:0.88;transform:translateY(-1px)}
button:active{transform:translateY(0)}
button:disabled{opacity:0.4;cursor:not-allowed}
.btn-primary{background:var(--accent);color:white}
.btn-secondary{background:rgba(255,255,255,0.08);color:var(--paper);border:1px solid var(--border)}
.btn-green{background:var(--green);color:white}

.role-toggle{display:flex;gap:8px;width:100%}
.role-btn{flex:1;padding:11px;border-radius:11px;border:2px solid rgba(255,255,255,0.1);background:transparent;color:var(--muted);font-size:0.87rem;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;font-weight:600}
.role-btn.active{border-color:var(--accent);background:var(--accent-dim);color:var(--paper)}

.player-list{display:flex;flex-direction:column;gap:7px;width:100%;max-height:280px;overflow-y:auto}
.player-item{display:flex;align-items:center;gap:10px;padding:9px 13px;background:rgba(255,255,255,0.04);border-radius:10px;border:1px solid var(--border);animation:slideIn 0.25s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.p-name{font-weight:600;font-size:0.88rem;flex:1}
.p-pts{font-family:'DM Mono',monospace;font-size:0.8rem;color:var(--gold)}

.dots{display:flex;gap:5px;justify-content:center;padding:10px 0}
.dot{width:8px;height:8px;border-radius:50%;background:var(--muted);animation:pulse 1.4s ease infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes pulse{0%,60%,100%{opacity:0.3;transform:scale(1)}30%{opacity:1;transform:scale(1.3)}}

.countdown-big{font-family:'Syne',sans-serif;font-size:7rem;font-weight:800;color:var(--accent);text-align:center;animation:popIn 0.3s ease;line-height:1}
@keyframes popIn{from{transform:scale(1.5);opacity:0}to{transform:scale(1);opacity:1}}

/* GAME */
.q-stage{width:100%;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:26px 20px 22px;text-align:center;position:relative}
.q-eyebrow{font-size:0.67rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--muted);margin-bottom:10px}
.cat-tag{display:inline-block;background:var(--accent-dim);border:1px solid var(--accent-bord);color:#6be89a;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:3px 10px;border-radius:8px;margin-bottom:14px}
.q-text{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;letter-spacing:-0.03em;color:var(--paper);line-height:1.2}
.q-hint{font-size:0.78rem;color:var(--muted);margin-top:8px;font-style:italic}

.timer-wrap{position:absolute;top:12px;right:12px}
.timer-wrap svg{width:42px;height:42px;transform:rotate(-90deg)}
.ring-track{fill:none;stroke:rgba(255,255,255,0.08);stroke-width:4}
.ring-prog{fill:none;stroke:var(--gold);stroke-width:4;stroke-linecap:round;stroke-dasharray:113;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke 0.3s}
.ring-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Syne',sans-serif;font-weight:800;font-size:0.82rem}

.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%}
.opt-btn{padding:13px 10px;border-radius:12px;border:2px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--paper);font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:8px;width:100%}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:var(--accent-dim);transform:translateY(-2px)}
.opt-btn:active{transform:translateY(0)}
.opt-btn:disabled{cursor:not-allowed}
.opt-btn.correct{background:rgba(42,157,92,0.2)!important;border-color:var(--green)!important;color:#5de097}
.opt-btn.wrong{background:rgba(230,57,70,0.15)!important;border-color:var(--red)!important;color:#ff8a93}
.opt-btn.reveal{background:rgba(42,157,92,0.1)!important;border-color:rgba(42,157,92,0.4)!important;color:#5de097}
.opt-key{font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--muted);background:rgba(255,255,255,0.07);padding:2px 6px;border-radius:4px;flex-shrink:0}

.flash{width:100%;padding:14px;border-radius:13px;text-align:center;font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;display:none;animation:flashIn 0.3s ease}
@keyframes flashIn{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}
.flash.show{display:block}
.flash.win{background:rgba(42,157,92,0.2);border:1px solid var(--green);color:#5de097}
.flash.lose{background:rgba(230,57,70,0.15);border:1px solid var(--red);color:#ff8a93}
.flash.neutral{background:rgba(245,166,35,0.15);border:1px solid var(--gold);color:var(--gold)}

.live-board{width:100%;display:flex;flex-direction:column;gap:5px}
.board-lbl{font-family:'DM Mono',monospace;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);margin-bottom:3px}
.board-row{display:flex;align-items:center;gap:9px;padding:8px 11px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:9px;transition:all 0.3s}
.board-row.leader{background:rgba(245,166,35,0.1);border-color:rgba(245,166,35,0.3)}
.board-row.me{border-color:var(--accent-bord)}
.b-rank{font-family:'Syne',sans-serif;font-weight:800;font-size:0.82rem;width:18px;text-align:center;color:var(--muted)}
.b-rank.gold{color:var(--gold)}
.b-name{font-weight:600;font-size:0.85rem;flex:1}
.b-pts{font-family:'DM Mono',monospace;font-size:0.87rem;color:var(--gold)}
.b-chg{font-size:0.72rem;font-weight:700;min-width:34px;text-align:right}
.b-chg.up{color:var(--green)}.b-chg.down{color:var(--red)}

.round-tag{background:var(--accent);color:white;padding:3px 10px;border-radius:20px;font-size:0.73rem;font-weight:700}

.podium{display:flex;align-items:flex-end;justify-content:center;gap:7px;width:100%;height:105px}
.pod{flex:1;border-radius:9px 9px 0 0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:10px;font-size:0.73rem;font-weight:700;gap:3px}
.pod-emoji{font-size:1.2rem}
.pod1{background:rgba(245,166,35,0.2);height:100%;border:1px solid rgba(245,166,35,0.35)}
.pod2{background:rgba(255,255,255,0.07);height:72%;border:1px solid rgba(255,255,255,0.12)}
.pod3{background:rgba(255,255,255,0.04);height:52%;border:1px solid rgba(255,255,255,0.08)}

.info-row{display:flex;justify-content:space-between;font-size:0.78rem;color:var(--muted);width:100%}

@media(max-width:400px){.opts-grid{grid-template-columns:1fr}.q-text{font-size:1.2rem}.countdown-big{font-size:5rem}}
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">Ord<span>jakten</span> 📖</a>
  <div class="header-right">
    <div class="round-info" id="header-info">Clashroom</div>
    <button class="lang-btn" onclick="toggleLang()"><span id="lang-flag">🇳🇴</span><span id="lang-txt">Norsk</span></button>
  </div>
</header>

<div class="screen active" id="screen-role">
  <div style="text-align:center;padding-top:16px"><div style="font-size:2.8rem;margin-bottom:14px">📖</div>
  <h1>Ord<em>jakten</em></h1>
  <p class="sub" id="t-subtitle"></p></div>
  <div class="role-toggle">
    <button class="role-btn active" onclick="selectRole('student')" id="role-student"></button>
    <button class="role-btn" onclick="selectRole('teacher')" id="role-teacher"></button>
  </div>
  <div class="card" style="display:flex;flex-direction:column;gap:11px">
    <input type="text" id="name-input" maxlength="20"/>
    <button class="btn-primary" onclick="joinGame()" id="t-join-btn"></button>
  </div>
  <p class="sub" style="font-size:0.73rem" id="t-share-hint"></p>
</div>

<div class="screen" id="screen-lobby">
  <h1 id="t-lobby-title"></h1>
  <p class="sub" id="lobby-count"></p>
  <div class="card" style="display:flex;flex-direction:column;gap:9px">
    <div class="player-list" id="player-list"></div>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>
  <div id="teacher-controls" style="display:none;width:100%;flex-direction:column;gap:9px">
    <button class="btn-green" onclick="startCountdown()" id="t-start-btn"></button>
    <div class="info-row"><span id="t-game-info"></span><span id="player-count-label"></span></div>
  </div>
</div>

<div class="screen" id="screen-countdown">
  <p class="sub" id="t-get-ready"></p>
  <div class="countdown-big" id="countdown-num">3</div>
  <p class="sub" id="t-fastest-wins"></p>
</div>

<div class="screen" id="screen-game">
  <div style="width:100%;display:flex;justify-content:space-between;align-items:center">
    <div class="round-tag">Q <span id="round-num">1</span>/20</div>
    <div style="font-family:'DM Mono',monospace;font-size:0.83rem;color:var(--gold)">⚡ <span id="my-score-live">0</span> pts</div>
  </div>
  <div class="q-stage">
    <div class="timer-wrap"><svg viewBox="0 0 44 44"><circle class="ring-track" cx="22" cy="22" r="18"/><circle class="ring-prog" id="ring-prog" cx="22" cy="22" r="18"/></svg><div class="ring-num" id="ring-num">12</div></div>
    <div class="q-eyebrow" id="t-q-eyebrow"></div>
    <div class="cat-tag" id="cat-tag"></div>
    <div class="q-text" id="q-text"></div>
    <div class="q-hint" id="q-hint"></div>
  </div>
  <div class="opts-grid" id="opts-grid"></div>
  <div class="flash" id="game-flash"></div>
  <div class="live-board"><div class="board-lbl" id="t-board-lbl"></div><div id="live-scoreboard"></div></div>
</div>

<div class="screen" id="screen-between">
  <h1 id="between-title"></h1>
  <div class="flash show neutral" id="between-flash"></div>
  <div style="width:100%;display:flex;flex-direction:column;gap:5px" id="between-board"></div>
</div>

<div class="screen" id="screen-results">
  <h1 id="t-results-title"></h1>
  <div class="podium" id="podium"></div>
  <div style="width:100%;display:flex;flex-direction:column;gap:5px;margin-top:6px" id="final-board"></div>
  <button class="btn-primary" onclick="resetGame()" id="t-play-again"></button>
  <button class="btn-secondary" onclick="showScreen('screen-role')" id="t-change-settings"></button>
</div>

<script>
const LANG={
  no:{
    subtitle:"Finn riktig synonym raskere enn resten av klassen.",
    role_student:"🎮 Elev",role_teacher:"🏫 Lærer",
    name_ph:"Navnet ditt...",join_btn:"Bli med →",
    share_hint:"Del siden med klassen – alle bruker sin egen enhet",
    lobby_title:"Venter på<br><em>ordjegere...</em>",
    start_btn:"▶ Start jakten",
    game_info:"20 ord · 12 sek hvert",
    get_ready:"Gjør deg klar...",
    fastest_wins:"📖 Finn synonymet raskest!",
    q_eyebrow:"Finn synonymet",
    board_lbl:"🏆 Live poengtavle",
    results_title:"Jakten<br><em>er over!</em>",
    play_again:"🔄 Ny jakt",
    change_settings:"Endre innstillinger",
    you_suffix:" (deg)",
    players_ready:n=>`${n} spiller${n!==1?'e':''} klar`,
    players_count:n=>`${n} spillere`,
    header_lobby:n=>`${n} i lobbyen`,
    header_q:(q,t)=>`Q ${q}/${t}`,
    flash_correct:pts=>`✓ Riktig! +${pts} pts`,
    flash_steal:(pts,n)=>`💥 Stjal ${pts} pts fra ${n} spiller${n!==1?'e':''}!`,
    flash_wrong:(pts,a)=>`✗ Feil! −${pts} pts. Svar: ${a}`,
    flash_timeout:a=>`⏱ Tiden er ute! Svar: ${a}`,
    chg_pos:pts=>`⚡ Du fikk +${pts} pts!`,
    chg_neg:pts=>`💸 Du mistet ${pts} pts`,
    chg_none:"⏱ Ingen endring denne runden",
    hint_prefix:"Hint: ",
  },
  en:{
    subtitle:"Find the right synonym faster than the rest of the class.",
    role_student:"🎮 Student",role_teacher:"🏫 Teacher",
    name_ph:"Your name...",join_btn:"Join →",
    share_hint:"Share this page with your class — everyone joins on their own device",
    lobby_title:"Waiting for<br><em>word hunters...</em>",
    start_btn:"▶ Start the hunt",
    game_info:"20 words · 12 sec each",
    get_ready:"Get ready...",
    fastest_wins:"📖 Find the synonym fastest!",
    q_eyebrow:"Find the synonym",
    board_lbl:"🏆 Live Scoreboard",
    results_title:"Hunt<br><em>Complete!</em>",
    play_again:"🔄 New Hunt",
    change_settings:"Change settings",
    you_suffix:" (you)",
    players_ready:n=>`${n} player${n!==1?'s':''} ready`,
    players_count:n=>`${n} players`,
    header_lobby:n=>`${n} in lobby`,
    header_q:(q,t)=>`Q ${q}/${t}`,
    flash_correct:pts=>`✓ Correct! +${pts} pts`,
    flash_steal:(pts,n)=>`💥 Stole ${pts} pts from ${n} player${n!==1?'s':''}!`,
    flash_wrong:(pts,a)=>`✗ Wrong! −${pts} pts. Answer: ${a}`,
    flash_timeout:a=>`⏱ Time's up! Answer: ${a}`,
    chg_pos:pts=>`⚡ You earned +${pts} pts!`,
    chg_neg:pts=>`💸 You lost ${pts} pts`,
    chg_none:"⏱ No change this round",
    hint_prefix:"Hint: ",
  }
};
let lang=localStorage.getItem('clashroom_lang')||'no';
const L=()=>LANG[lang];
function applyLang(){
  document.documentElement.lang=lang;
  document.getElementById('lang-flag').textContent=lang==='no'?'🇳🇴':'🇬🇧';
  document.getElementById('lang-txt').textContent=lang==='no'?'Norsk':'English';
  const s=(id,v)=>{const e=document.getElementById(id);if(e)e.innerHTML=v};
  const t=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v};
  const p=(id,v)=>{const e=document.getElementById(id);if(e)e.placeholder=v};
  s('t-subtitle',L().subtitle);t('role-student',L().role_student);t('role-teacher',L().role_teacher);
  p('name-input',L().name_ph);t('t-join-btn',L().join_btn);t('t-share-hint',L().share_hint);
  s('t-lobby-title',L().lobby_title);t('t-start-btn',L().start_btn);t('t-game-info',L().game_info);
  t('t-get-ready',L().get_ready);t('t-fastest-wins',L().fastest_wins);t('t-q-eyebrow',L().q_eyebrow);
  t('t-board-lbl',L().board_lbl);s('t-results-title',L().results_title);t('t-play-again',L().play_again);
  t('t-change-settings',L().change_settings);
  if(G.players.length>0)renderLobby();
}
function toggleLang(){lang=lang==='no'?'en':'no';localStorage.setItem('clashroom_lang',lang);applyLang();}

// Norwegian synonym questions — word + 4 options + correct answer + category + hint
const QS=[
  {word:"glad",cat:"Adjektiv",hint:"Følelsen du har på bursdagen din",opts:["trist","fornøyd","sint","redd"],a:"fornøyd"},
  {word:"stor",cat:"Adjektiv",hint:"Motsatt av liten",opts:["liten","enorm","smal","kort"],a:"enorm"},
  {word:"rask",cat:"Adjektiv",hint:"Usain Bolt er veldig ___",opts:["treg","kjapp","lat","sterk"],a:"kjapp"},
  {word:"fin",cat:"Adjektiv",hint:"Noe pent å se på",opts:["stygg","vakker","farlig","mørk"],a:"vakker"},
  {word:"lei seg",cat:"Adjektiv",hint:"Når du gråter",opts:["bedrøvet","lykkelig","sinna","overrasket"],a:"bedrøvet"},
  {word:"smart",cat:"Adjektiv",hint:"Einstein var veldig ___",opts:["dum","klok","rar","modig"],a:"klok"},
  {word:"gammel",cat:"Adjektiv",hint:"Bestemor er ganske ___",opts:["ung","eldgammel","ny","frisk"],a:"eldgammel"},
  {word:"rar",cat:"Adjektiv",hint:"Noe som er litt merkelig",opts:["vanlig","underlig","normal","kjent"],a:"underlig"},
  {word:"viktig",cat:"Adjektiv",hint:"Noe du ikke kan hoppe over",opts:["uviktig","vesentlig","kjedelig","enkel"],a:"vesentlig"},
  {word:"vanskelig",cat:"Adjektiv",hint:"Matteprøven var veldig ___",opts:["lett","krevende","morsom","kort"],a:"krevende"},
  {word:"snill",cat:"Adjektiv",hint:"Noen som hjelper andre",opts:["slem","vennlig","lat","stille"],a:"vennlig"},
  {word:"modig",cat:"Adjektiv",hint:"En helt er alltid ___",opts:["feig","tapper","forsiktig","rolig"],a:"tapper"},
  {word:"gå",cat:"Verb",hint:"Å bevege seg fremover til fots",opts:["springe","spasere","hoppe","sitte"],a:"spasere"},
  {word:"si",cat:"Verb",hint:"Å bruke stemmen for å formidle noe",opts:["hviske","ytre","tenke","høre"],a:"ytre"},
  {word:"se",cat:"Verb",hint:"Å bruke øynene",opts:["høre","skue","lukte","kjenne"],a:"skue"},
  {word:"lage",cat:"Verb",hint:"Å skape noe nytt",opts:["ødelegge","fremstille","miste","glemme"],a:"fremstille"},
  {word:"hjelpe",cat:"Verb",hint:"Å gi noen en hånd",opts:["hindre","bistå","nekte","ignorere"],a:"bistå"},
  {word:"forstå",cat:"Verb",hint:"Å skjønne hva noen mener",opts:["glemme","begripe","tvile","spørre"],a:"begripe"},
  {word:"slutt",cat:"Substantiv",hint:"Når noe tar ___",opts:["start","avslutning","midten","begynnelse"],a:"avslutning"},
  {word:"fare",cat:"Substantiv",hint:"Noe som kan skade deg",opts:["trygghet","risiko","sjanse","mulighet"],a:"risiko"},
  {word:"venn",cat:"Substantiv",hint:"Noen du liker å være med",opts:["fiende","kamerat","nabo","elev"],a:"kamerat"},
  {word:"sted",cat:"Substantiv",hint:"En plass du kan gå til",opts:["tid","lokasjon","retning","avstand"],a:"lokasjon"},
  {word:"feil",cat:"Substantiv",hint:"Noe som ikke er riktig",opts:["suksess","tabbe","plan","resultat"],a:"tabbe"},
  {word:"jobb",cat:"Substantiv",hint:"Noe voksne gjør for å tjene penger",opts:["ferie","arbeid","hobby","hvile"],a:"arbeid"},
  {word:"idé",cat:"Substantiv",hint:"En tanke du får i hodet",opts:["drøm","innfall","minne","følelse"],a:"innfall"},
  {word:"sinne",cat:"Substantiv",hint:"Følelsen når du blir veldig irritert",opts:["glede","raseri","angst","kjedsomhet"],a:"raseri"},
  {word:"reise",cat:"Verb",hint:"Å dra til et annet sted",opts:["bli","ferdes","sove","vente"],a:"ferdes"},
  {word:"tenke",cat:"Verb",hint:"Å bruke hjernen",opts:["glemme","gruble","sove","le"],a:"gruble"},
  {word:"søke",cat:"Verb",hint:"Å prøve å finne noe",opts:["gjemme","lete","miste","kaste"],a:"lete"},
  {word:"endre",cat:"Verb",hint:"Å gjøre noe annerledes",opts:["beholde","forandre","kopiere","gjenta"],a:"forandre"},
];

const COLORS=['#e63946','#22c55e','#f5a623','#2176ae','#9b5de5','#f77f00','#4cc9f0','#0d9488','#ef476f','#06d6a0'];
const TIME_MAX=12,ROUNDS=20,STEAL_EACH=25,PENALTY=20;

const G={role:'student',myName:'',isTeacher:false,players:[],scores:{},lastChange:{},questions:[],round:0,answered:false,timeLeft:TIME_MAX,timer:null};

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function colorFor(n){let h=0;for(const c of n)h=c.charCodeAt(0)+((h<<5)-h);return COLORS[Math.abs(h)%COLORS.length]}
function initials(n){return n.charAt(0).toUpperCase()}
function avHtml(n,sz=26){return`<div style="background:${colorFor(n)};width:${sz}px;height:${sz}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:${Math.round(sz*.34)}px;flex-shrink:0;">${initials(n)}</div>`}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function updateRing(c,m){document.getElementById('ring-prog').style.strokeDashoffset=113-(c/m)*113}

function selectRole(r){G.role=r;document.getElementById('role-student').classList.toggle('active',r==='student');document.getElementById('role-teacher').classList.toggle('active',r==='teacher')}

function joinGame(){
  const name=document.getElementById('name-input').value.trim();
  if(!name){document.getElementById('name-input').focus();return}
  G.myName=name;G.isTeacher=G.role==='teacher';
  if(!G.players.includes(name)){G.players.push(name);G.scores[name]=0;G.lastChange[name]=0}
  renderLobby();showScreen('screen-lobby');
  if(G.isTeacher)document.getElementById('teacher-controls').style.display='flex';
}

function renderLobby(){
  const list=document.getElementById('player-list');list.innerHTML='';
  G.players.forEach(p=>{const el=document.createElement('div');el.className='player-item';el.innerHTML=`${avHtml(p,32)}<div class="p-name">${p}</div><div class="p-pts">⚡ ${G.scores[p]||0}</div>`;list.appendChild(el)});
  const n=G.players.length;
  document.getElementById('lobby-count').textContent=L().players_ready(n);
  document.getElementById('player-count-label').textContent=L().players_count(n);
  document.getElementById('header-info').textContent=L().header_lobby(n);
}

function startCountdown(){
  G.questions=shuffle(QS).slice(0,ROUNDS);G.round=0;
  G.players.forEach(p=>{G.scores[p]=0;G.lastChange[p]=0});
  showScreen('screen-countdown');let n=3;
  document.getElementById('countdown-num').textContent=n;
  const iv=setInterval(()=>{n--;if(n<=0){clearInterval(iv);startRound()}else document.getElementById('countdown-num').textContent=n},1000);
}

function startRound(){
  if(G.round>=ROUNDS){showResults();return}
  const q=G.questions[G.round];G.answered=false;G.timeLeft=TIME_MAX;
  document.getElementById('round-num').textContent=G.round+1;
  document.getElementById('cat-tag').textContent=q.cat;
  document.getElementById('q-text').textContent=q.word;
  document.getElementById('q-hint').textContent=L().hint_prefix+q.hint;
  document.getElementById('game-flash').className='flash';
  document.getElementById('my-score-live').textContent=G.scores[G.myName]||0;
  document.getElementById('header-info').textContent=L().header_q(G.round+1,ROUNDS);
  document.getElementById('ring-num').textContent=TIME_MAX;

  const keys=['1','2','3','4'];
  const grid=document.getElementById('opts-grid');grid.innerHTML='';
  const opts=shuffle(q.opts);
  opts.forEach((opt,i)=>{const btn=document.createElement('button');btn.className='opt-btn';btn.dataset.v=opt;btn.innerHTML=`<span class="opt-key">${keys[i]}</span>${opt}`;btn.onclick=()=>pick(opt,btn,q);grid.appendChild(btn)});

  renderBoard();showScreen('screen-game');
  updateRing(TIME_MAX,TIME_MAX);document.getElementById('ring-prog').style.stroke='var(--gold)';
  clearInterval(G.timer);
  G.timer=setInterval(()=>{G.timeLeft--;document.getElementById('ring-num').textContent=G.timeLeft;updateRing(G.timeLeft,TIME_MAX);if(G.timeLeft<=3)document.getElementById('ring-prog').style.stroke='var(--red)';else if(G.timeLeft<=6)document.getElementById('ring-prog').style.stroke='var(--gold)';if(G.timeLeft<=0){clearInterval(G.timer);if(!G.answered)timeout(q)}},1000);
}

function pick(chosen,btn,q){
  if(G.answered)return;clearInterval(G.timer);G.answered=true;
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  const ok=chosen===q.a;const timeBonus=Math.round((G.timeLeft/TIME_MAX)*60);
  const flash=document.getElementById('game-flash');
  if(ok){
    btn.classList.add('correct');let gained=100+timeBonus;let stolen=0;const sf=[];
    G.players.forEach(p=>{if(p!==G.myName){if((G.scores[p]||0)>0){const s=Math.min(STEAL_EACH,G.scores[p]);G.scores[p]-=s;G.lastChange[p]=-s;stolen+=s;sf.push(p)}else G.lastChange[p]=0}});
    gained+=stolen;G.scores[G.myName]=(G.scores[G.myName]||0)+gained;G.lastChange[G.myName]=gained;
    flash.textContent=sf.length>0?L().flash_steal(gained,sf.length):L().flash_correct(gained);flash.className='flash show win';
  }else{
    btn.classList.add('wrong');document.querySelectorAll('.opt-btn').forEach(b=>{if(b.dataset.v===q.a)b.classList.add('reveal')});
    G.scores[G.myName]=Math.max(0,(G.scores[G.myName]||0)-PENALTY);G.lastChange[G.myName]=-PENALTY;
    G.players.forEach(p=>{if(p!==G.myName)G.lastChange[p]=0});
    flash.textContent=L().flash_wrong(PENALTY,q.a);flash.className='flash show lose';
  }
  document.getElementById('my-score-live').textContent=G.scores[G.myName]||0;renderBoard();
  setTimeout(()=>between(q.a),1600);
}

function timeout(q){
  G.answered=true;document.querySelectorAll('.opt-btn').forEach(b=>{b.disabled=true;if(b.dataset.v===q.a)b.classList.add('reveal')});
  G.players.forEach(p=>{G.lastChange[p]=0});
  const flash=document.getElementById('game-flash');flash.textContent=L().flash_timeout(q.a);flash.className='flash show neutral';
  renderBoard();setTimeout(()=>between(q.a),1600);
}

function renderBoard(){
  const sorted=[...G.players].sort((a,b)=>(G.scores[b]||0)-(G.scores[a]||0));
  const c=document.getElementById('live-scoreboard');c.innerHTML='';
  sorted.slice(0,6).forEach((p,i)=>{const chg=G.lastChange[p]||0;const isMe=p===G.myName;
    const el=document.createElement('div');el.className='board-row'+(i===0?' leader':'')+(isMe?' me':'');
    el.innerHTML=`<div class="b-rank${i===0?' gold':''}">${i===0?'👑':i+1}</div>${avHtml(p,24)}<div class="b-name">${p}${isMe?L().you_suffix:''}</div><div class="b-pts">${G.scores[p]||0}</div><div class="b-chg ${chg>0?'up':chg<0?'down':''}">${chg>0?'+'+chg:chg<0?chg:''}</div>`;
    c.appendChild(el)});
}

function between(ans){
  document.getElementById('between-title').innerHTML=`Svar: <em>${ans}</em>`;
  const chg=G.lastChange[G.myName]||0;const bf=document.getElementById('between-flash');
  if(chg>0){bf.textContent=L().chg_pos(chg);bf.className='flash show win'}
  else if(chg<0){bf.textContent=L().chg_neg(Math.abs(chg));bf.className='flash show lose'}
  else{bf.textContent=L().chg_none;bf.className='flash show neutral'}
  const sorted=[...G.players].sort((a,b)=>(G.scores[b]||0)-(G.scores[a]||0));
  const board=document.getElementById('between-board');board.innerHTML='';
  sorted.slice(0,6).forEach((p,i)=>{const el=document.createElement('div');el.className='board-row'+(i===0?' leader':'');el.innerHTML=`<div class="b-rank${i===0?' gold':''}">${i===0?'👑':i+1}</div>${avHtml(p,24)}<div class="b-name">${p}</div><div class="b-pts">${G.scores[p]||0} pts</div>`;board.appendChild(el)});
  showScreen('screen-between');G.round++;
  setTimeout(()=>{if(G.round>=ROUNDS)showResults();else startRound()},2500);
}

function showResults(){
  const sorted=[...G.players].sort((a,b)=>(G.scores[b]||0)-(G.scores[a]||0));
  const podium=document.getElementById('podium');podium.innerHTML='';
  [[1,'pod2'],[0,'pod1'],[2,'pod3']].forEach(([idx,cls])=>{const p=sorted[idx];if(!p)return;const d=document.createElement('div');d.className=`pod ${cls}`;d.innerHTML=`<div class="pod-emoji">${['🥇','🥈','🥉'][idx]}</div><div>${p.split(' ')[0]}</div><div style="color:var(--gold);font-family:'DM Mono',monospace;font-size:0.75rem">${G.scores[p]||0}</div>`;podium.appendChild(d)});
  const fb=document.getElementById('final-board');fb.innerHTML='';
  sorted.forEach((p,i)=>{const el=document.createElement('div');el.className='board-row'+(i===0?' leader':'');el.innerHTML=`<div class="b-rank${i===0?' gold':''}">${i+1}</div>${avHtml(p,28)}<div class="b-name">${p}</div><div class="b-pts">⚡ ${G.scores[p]||0}</div>`;fb.appendChild(el)});
  showScreen('screen-results');
}
function resetGame(){G.players.forEach(p=>{G.scores[p]=0;G.lastChange[p]=0});G.round=0;renderLobby();showScreen('screen-lobby')}

document.addEventListener('keydown',e=>{
  const active=document.querySelector('.screen.active');if(!active)return;
  if(active.id==='screen-role'&&e.key==='Enter'){joinGame();return}
  if(active.id==='screen-game'&&!G.answered){const i={'1':0,'2':1,'3':2,'4':3}[e.key];if(i!==undefined){const bs=document.querySelectorAll('.opt-btn');if(bs[i])bs[i].click()}}
});

applyLang();
</script>
</body>
</html>
