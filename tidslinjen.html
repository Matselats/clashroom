<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tidslinjen – Clashroom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f1a;--card:#1a1a2e;--paper:#f0ede6;
  --accent:#8b5cf6;--accent-h:#7c3aed;
  --green:#22c55e;--red:#ef4444;
  --muted:rgba(240,237,230,.45);--border:rgba(240,237,230,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--paper);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

.lang-btn{position:fixed;top:16px;right:16px;background:var(--card);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:8px;font-size:.75rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;z-index:50}
.lang-btn:hover{color:var(--paper)}

.screen{display:none;width:100%;max-width:560px;flex-direction:column;align-items:center}
.screen.on{display:flex}

h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.6rem;text-align:center;margin-bottom:6px;letter-spacing:-.02em}
.sub{color:var(--muted);font-size:.85rem;text-align:center;margin-bottom:28px}

.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%}
.card+.card{margin-top:12px}
.card-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px;font-weight:600}
textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--paper);font-family:'Inter',sans-serif;font-size:.85rem;resize:vertical;min-height:80px}
textarea::placeholder{color:var(--muted)}
textarea:focus{outline:none;border-color:var(--accent)}

.mode-row{display:flex;gap:8px;margin-top:8px}
.mode-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s;text-align:center}
.mode-btn.on{border-color:var(--accent);color:var(--paper);background:rgba(139,92,246,.12)}

.start-btn{margin-top:20px;background:var(--accent);color:#fff;border:none;padding:14px 32px;border-radius:12px;font-family:'Inter',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:background .15s;width:100%}
.start-btn:hover{background:var(--accent-h)}

/* GAME */
.top-bar{display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:20px}
.round-label{font-size:.75rem;color:var(--muted);font-weight:600}
.timer-ring{position:relative;width:48px;height:48px}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring circle{fill:none;stroke-width:3}
.timer-bg{stroke:var(--border)}
.timer-fg{stroke:var(--accent);stroke-dasharray:113;stroke-dashoffset:0;transition:stroke-dashoffset .3s linear}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem}

.event-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 24px;width:100%;margin-bottom:8px;text-align:center}
.event-text{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1.15rem;line-height:1.35;margin-bottom:8px}
.event-cat{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);font-weight:600}

.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:16px}
.opt{background:rgba(255,255,255,.04);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--paper);font-family:'Inter',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .15s;text-align:center}
.opt:hover:not(.locked){border-color:var(--accent);background:rgba(139,92,246,.08)}
.opt.correct{background:rgba(34,197,94,.15);border-color:var(--green);color:var(--green)}
.opt.wrong{background:rgba(239,68,68,.1);border-color:var(--red);color:var(--red)}
.opt.locked{cursor:default;opacity:.6}
.opt.show-correct{border-color:var(--green);opacity:1}

.scores{width:100%;margin-top:8px}
.score-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.score-row:last-child{border:none}
.score-name{font-weight:600}
.score-pts{font-weight:700;color:var(--accent)}
.steal-tag{font-size:.65rem;background:var(--accent);color:#fff;padding:2px 7px;border-radius:6px;margin-left:6px;font-weight:700}

/* RESULT */
.podium{display:flex;justify-content:center;align-items:flex-end;gap:12px;margin:24px 0 32px;width:100%}
.pod{display:flex;flex-direction:column;align-items:center;gap:6px}
.pod-bar{width:64px;border-radius:10px 10px 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:12px;font-weight:800;font-size:1.1rem}
.pod-name{font-size:.78rem;font-weight:600;max-width:80px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pod-pts{font-size:.72rem;color:var(--muted)}
.pod:nth-child(1) .pod-bar{height:120px;background:var(--accent)}
.pod:nth-child(2) .pod-bar{height:88px;background:rgba(139,92,246,.5)}
.pod:nth-child(3) .pod-bar{height:64px;background:rgba(139,92,246,.25)}

.play-again{margin-top:8px;background:var(--accent);color:#fff;border:none;padding:14px 32px;border-radius:12px;font-family:'Inter',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;width:100%}
.play-again:hover{background:var(--accent-h)}
.home-link{margin-top:12px;color:var(--muted);font-size:.82rem;text-decoration:none}
.home-link:hover{color:var(--paper)}

@media(max-width:480px){
  .opts{grid-template-columns:1fr}
  .event-text{font-size:1rem}
}
</style>
</head>
<body>

<button class="lang-btn" onclick="toggleLang()" id="langBtn">EN</button>

<!-- SETUP -->
<div class="screen on" id="setup">
  <h1 data-no="Tidslinjen" data-en="The Timeline">Tidslinjen</h1>
  <p class="sub" data-no="Hvilket år skjedde det? Test historiekunnskapen din." data-en="What year did it happen? Test your history knowledge.">Hvilket år skjedde det? Test historiekunnskapen din.</p>

  <div class="card">
    <div class="card-label" data-no="Spillere (én per linje)" data-en="Players (one per line)">Spillere (én per linje)</div>
    <textarea id="names" placeholder="Ola&#10;Kari&#10;Henrik"></textarea>
  </div>

  <div class="card">
    <div class="card-label" data-no="Kategori" data-en="Category">Kategori</div>
    <div class="mode-row">
      <button class="mode-btn on" onclick="setMode('mixed',this)" data-no="Blandet" data-en="Mixed">Blandet</button>
      <button class="mode-btn" onclick="setMode('norge',this)" data-no="Norgeshistorie" data-en="Norwegian history">Norgeshistorie</button>
      <button class="mode-btn" onclick="setMode('verden',this)" data-no="Verdenshistorie" data-en="World history">Verdenshistorie</button>
    </div>
  </div>

  <button class="start-btn" onclick="startGame()" data-no="Start spill" data-en="Start game">Start spill</button>
</div>

<!-- GAME -->
<div class="screen" id="game">
  <div class="top-bar">
    <span class="round-label" id="roundLabel">1 / 20</span>
    <div class="timer-ring">
      <svg width="48" height="48" viewBox="0 0 40 40"><circle class="timer-bg" cx="20" cy="20" r="18"/><circle class="timer-fg" id="timerFg" cx="20" cy="20" r="18"/></svg>
      <div class="timer-num" id="timerNum">12</div>
    </div>
  </div>

  <div class="event-card">
    <div class="event-text" id="eventText"></div>
    <div class="event-cat" id="eventCat"></div>
  </div>

  <div class="opts" id="opts"></div>
  <div class="scores" id="scores"></div>
</div>

<!-- RESULT -->
<div class="screen" id="result">
  <h1 data-no="Resultater" data-en="Results">Resultater</h1>
  <div class="podium" id="podium"></div>
  <button class="play-again" onclick="reset()" data-no="Spill igjen" data-en="Play again">Spill igjen</button>
  <a class="home-link" href="index.html" data-no="← Tilbake til Clashroom" data-en="← Back to Clashroom">← Tilbake til Clashroom</a>
</div>

<script>
var TOTAL=20,TIME=12,STEAL_EACH=25;
var lang=localStorage.getItem('clashroom_lang')||'no';
var mode='mixed';

var EVENTS=[
  {no:'Svartedauden kommer til Norge',en:'The Black Death reaches Norway',y:1349,cat:'norge',d:[1349,1066,1536,1814]},
  {no:'Norge blir selvstendig fra Sverige',en:'Norway gains independence from Sweden',y:1905,cat:'norge',d:[1905,1814,1884,1940]},
  {no:'Grunnloven blir vedtatt på Eidsvoll',en:'The Constitution is adopted at Eidsvoll',y:1814,cat:'norge',d:[1814,1905,1776,1848]},
  {no:'Vikingene oppdager Amerika',en:'Vikings discover America',y:1001,cat:'norge',d:[1001,1066,793,1492]},
  {no:'Angrepet på Lindisfarne — vikingtiden starter',en:'Attack on Lindisfarne — the Viking Age begins',y:793,cat:'norge',d:[793,1001,476,1066]},
  {no:'Slaget på Stiklestad',en:'Battle of Stiklestad',y:1030,cat:'norge',d:[1030,793,1066,1349]},
  {no:'Kalmarunionen opprettes',en:'The Kalmar Union is established',y:1397,cat:'norge',d:[1397,1349,1536,1319]},
  {no:'Norge i union med Danmark',en:'Norway enters union with Denmark',y:1536,cat:'norge',d:[1536,1397,1814,1660]},
  {no:'Tysk invasjon av Norge',en:'German invasion of Norway',y:1940,cat:'norge',d:[1940,1945,1939,1914]},
  {no:'Norge frigjort fra tysk okkupasjon',en:'Norway liberated from German occupation',y:1945,cat:'norge',d:[1945,1940,1939,1944]},
  {no:'Olje oppdages i Nordsjøen',en:'Oil discovered in the North Sea',y:1969,cat:'norge',d:[1969,1972,1945,1960]},
  {no:'Norge stemmer nei til EU',en:'Norway votes no to EU membership',y:1994,cat:'norge',d:[1994,1972,2001,1989]},
  {no:'OL på Lillehammer',en:'Olympics at Lillehammer',y:1994,cat:'norge',d:[1994,1992,2000,1988]},
  {no:'Terrorangrepet 22. juli',en:'The July 22 terror attacks',y:2011,cat:'norge',d:[2011,2001,2015,2008]},
  {no:'Harald Hårfagre samler Norge',en:'Harald Fairhair unifies Norway',y:872,cat:'norge',d:[872,793,1030,1066]},

  {no:'Den franske revolusjonen starter',en:'The French Revolution begins',y:1789,cat:'verden',d:[1789,1776,1804,1815]},
  {no:'Columbus kommer til Amerika',en:'Columbus reaches America',y:1492,cat:'verden',d:[1492,1500,1776,1453]},
  {no:'Første verdenskrig starter',en:'World War I begins',y:1914,cat:'verden',d:[1914,1918,1939,1905]},
  {no:'Andre verdenskrig starter',en:'World War II begins',y:1939,cat:'verden',d:[1939,1940,1945,1914]},
  {no:'Berlinmuren faller',en:'The Berlin Wall falls',y:1989,cat:'verden',d:[1989,1991,1945,1961]},
  {no:'Månelandingen — Apollo 11',en:'Moon landing — Apollo 11',y:1969,cat:'verden',d:[1969,1961,1957,1972]},
  {no:'Den amerikanske uavhengighetserklæringen',en:'The American Declaration of Independence',y:1776,cat:'verden',d:[1776,1789,1492,1783]},
  {no:'Konstantinopel faller til osmanerne',en:'Constantinople falls to the Ottomans',y:1453,cat:'verden',d:[1453,1492,1066,1349]},
  {no:'Romerriket faller (Vest-Rom)',en:'Fall of the Roman Empire (Western Rome)',y:476,cat:'verden',d:[476,410,793,1066]},
  {no:'Den industrielle revolusjonen starter',en:'The Industrial Revolution begins',y:1760,cat:'verden',d:[1760,1789,1815,1700]},
  {no:'Slaveriet avskaffes i USA',en:'Slavery abolished in the USA',y:1865,cat:'verden',d:[1865,1776,1848,1900]},
  {no:'Sovjetunionen oppløses',en:'The Soviet Union dissolves',y:1991,cat:'verden',d:[1991,1989,2001,1945]},
  {no:'Martin Luther King holder "I Have a Dream"',en:'Martin Luther King gives "I Have a Dream"',y:1963,cat:'verden',d:[1963,1968,1955,1969]},
  {no:'Nelson Mandela blir president i Sør-Afrika',en:'Nelson Mandela becomes president of South Africa',y:1994,cat:'verden',d:[1994,1990,2000,1989]},
  {no:'Atombombene over Hiroshima og Nagasaki',en:'Atomic bombs on Hiroshima and Nagasaki',y:1945,cat:'verden',d:[1945,1939,1941,1944]},
  {no:'Gutenbergs trykkpresse oppfunnet',en:'Gutenberg\'s printing press invented',y:1440,cat:'verden',d:[1440,1492,1453,1350]},
  {no:'Magna Carta undertegnes',en:'Magna Carta signed',y:1215,cat:'verden',d:[1215,1066,1349,1453]},
  {no:'Terrorangrepet 11. september',en:'September 11 terror attacks',y:2001,cat:'verden',d:[2001,1999,2003,1995]},
  {no:'Kinesisk revolusjon — Mao grunnlegger Folkerepublikken',en:'Chinese Revolution — Mao founds People\'s Republic',y:1949,cat:'verden',d:[1949,1945,1911,1966]},
  {no:'Slaget ved Hastings',en:'Battle of Hastings',y:1066,cat:'verden',d:[1066,1215,793,1030]},
];

var players=[],scores=[],round=0,questions=[],timer,timeLeft,answered,currentPlayer;

function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}

function makeQuestions(){
  var pool=EVENTS.filter(function(e){return mode==='mixed'||e.cat===mode});
  pool=shuffle(pool.slice());
  return pool.slice(0,TOTAL);
}

function show(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('on')});document.getElementById(id).classList.add('on')}

function setMode(m,btn){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
}

function startGame(){
  var raw=document.getElementById('names').value.trim();
  if(!raw)return;
  players=raw.split('\n').map(function(n){return n.trim()}).filter(Boolean);
  if(!players.length)return;
  scores=players.map(function(){return 0});
  round=0;
  currentPlayer=0;
  questions=makeQuestions();
  if(questions.length<TOTAL)TOTAL=questions.length;
  show('game');
  showRound();
}

function showRound(){
  var q=questions[round];
  document.getElementById('roundLabel').textContent=(round+1)+' / '+TOTAL;
  document.getElementById('eventText').textContent=lang==='en'?q.en:q.no;
  var catLabel=q.cat==='norge'?(lang==='en'?'Norwegian history':'Norgeshistorie'):(lang==='en'?'World history':'Verdenshistorie');
  document.getElementById('eventCat').textContent=catLabel;

  var optsEl=document.getElementById('opts');
  optsEl.innerHTML='';
  answered=new Array(players.length).fill(null);

  var dates=shuffle(q.d.slice());
  var correctIdx=dates.indexOf(q.y);

  dates.forEach(function(yr,i){
    var btn=document.createElement('button');
    btn.className='opt';
    btn.textContent=yr;
    btn.onclick=function(){pickAnswer(i,correctIdx)};
    optsEl.appendChild(btn);
  });

  questions[round]._correctIdx=correctIdx;
  renderScores();
  startTimer();
}

function startTimer(){
  timeLeft=TIME;
  document.getElementById('timerNum').textContent=timeLeft;
  document.getElementById('timerFg').style.strokeDashoffset='0';
  clearInterval(timer);
  timer=setInterval(function(){
    timeLeft--;
    document.getElementById('timerNum').textContent=Math.max(0,timeLeft);
    document.getElementById('timerFg').style.strokeDashoffset=(113*(1-timeLeft/TIME));
    if(timeLeft<=0){clearInterval(timer);endRound()}
  },1000);
}

function pickAnswer(optIdx,correctIdx){
  if(answered[currentPlayer]!==null)return;
  answered[currentPlayer]=optIdx;
  currentPlayer=(currentPlayer+1)%players.length;
  if(answered.every(function(a){return a!==null})){clearInterval(timer);endRound()}
}

function endRound(){
  var q=questions[round];
  var ci=q._correctIdx;
  var btns=document.getElementById('opts').children;
  for(var i=0;i<btns.length;i++){
    btns[i].classList.add('locked');
    if(i===ci)btns[i].classList.add('correct');
  }

  var firstCorrect=-1;
  for(var p=0;p<players.length;p++){
    if(answered[p]===ci){
      if(firstCorrect===-1)firstCorrect=p;
      scores[p]+=100;
    }
  }

  if(firstCorrect!==-1){
    var stolen=0;
    for(var p=0;p<players.length;p++){
      if(p!==firstCorrect&&scores[p]>0){
        var take=Math.min(STEAL_EACH,scores[p]);
        scores[p]-=take;
        stolen+=take;
      }
    }
    scores[firstCorrect]+=stolen;
  }

  renderScores(firstCorrect);

  for(var p=0;p<players.length;p++){
    if(answered[p]!==null&&answered[p]!==ci){
      btns[answered[p]].classList.add('wrong');
    }
  }

  currentPlayer=0;
  setTimeout(function(){
    round++;
    if(round>=TOTAL)showResult();
    else showRound();
  },2000);
}

function renderScores(stealer){
  var el=document.getElementById('scores');
  var sorted=players.map(function(n,i){return{name:n,pts:scores[i],idx:i}}).sort(function(a,b){return b.pts-a.pts});
  el.innerHTML=sorted.map(function(p){
    var st=(stealer===p.idx)?'<span class="steal-tag">STEAL</span>':'';
    return '<div class="score-row"><span class="score-name">'+p.name+st+'</span><span class="score-pts">'+p.pts+'p</span></div>';
  }).join('');
}

function showResult(){
  show('result');
  var sorted=players.map(function(n,i){return{name:n,pts:scores[i]}}).sort(function(a,b){return b.pts-a.pts});
  var pod=document.getElementById('podium');
  pod.innerHTML='';
  var top=sorted.slice(0,3);
  var order=top.length>=2?[top[1],top[0],top.length>2?top[2]:null]:[top[0]];
  order.forEach(function(p){
    if(!p)return;
    var div=document.createElement('div');
    div.className='pod';
    var rank=top.indexOf(p)+1;
    div.innerHTML='<div class="pod-name">'+p.name+'</div><div class="pod-bar">'+rank+'</div><div class="pod-pts">'+p.pts+'p</div>';
    pod.appendChild(div);
  });
}

function reset(){show('setup');round=0;currentPlayer=0;TOTAL=20}

function toggleLang(){
  lang=lang==='no'?'en':'no';
  localStorage.setItem('clashroom_lang',lang);
  applyLang();
}
function applyLang(){
  document.getElementById('langBtn').textContent=lang==='no'?'EN':'NO';
  document.querySelectorAll('[data-'+lang+']').forEach(function(el){
    if(el.tagName==='INPUT'||el.tagName==='TEXTAREA')el.placeholder=el.getAttribute('data-'+lang);
    else el.innerHTML=el.getAttribute('data-'+lang);
  });
}
applyLang();
</script>
</body>
</html>
