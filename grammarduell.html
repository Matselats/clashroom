<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Duel – Clashroom</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --ink: #0f0f1a;
    --paper: #f0ede6;
    --blue: #2176ae;
    --blue-dim: rgba(33,118,174,0.14);
    --blue-border: rgba(33,118,174,0.35);
    --gold: #f5a623;
    --green: #2a9d5c;
    --red: #e63946;
    --card: #1a1a2e;
    --border: rgba(255,255,255,0.08);
    --muted: #6b6b80;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--ink);
    color: var(--paper);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: rgba(15,15,26,0.97);
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.15rem;
    letter-spacing: -0.03em;
    text-decoration: none;
    color: var(--paper);
  }
  .logo span { color: var(--blue); }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .round-info {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    background: rgba(255,255,255,0.05);
    padding: 4px 10px;
    border-radius: 20px;
  }

  .lang-btn {
    display: flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--paper);
    padding: 5px 11px;
    border-radius: 20px;
    font-size: 0.77rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .lang-btn:hover { background: rgba(255,255,255,0.13); }

  .screen { display: none; width: 100%; max-width: 500px; padding: 28px 20px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; gap: 16px; }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2.1rem;
    letter-spacing: -0.05em;
    line-height: 1.05;
    text-align: center;
  }
  h1 em { color: var(--blue); font-style: normal; }

  .sub { color: var(--muted); font-size: 0.88rem; text-align: center; line-height: 1.55; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    width: 100%;
  }

  input[type="text"] {
    width: 100%;
    padding: 13px 16px;
    border-radius: 11px;
    border: 2px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: var(--paper);
    font-size: 1rem;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--blue); }
  input[type="text"]::placeholder { color: var(--muted); }

  button {
    width: 100%;
    padding: 13px;
    border-radius: 12px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.93rem;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  button:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary { background: var(--blue); color: white; }
  .btn-secondary { background: rgba(255,255,255,0.08); color: var(--paper); border: 1px solid var(--border); }
  .btn-green { background: var(--green); color: white; }

  .role-toggle { display: flex; gap: 8px; width: 100%; }
  .role-btn {
    flex: 1; padding: 11px;
    border-radius: 11px;
    border: 2px solid rgba(255,255,255,0.1);
    background: transparent;
    color: var(--muted);
    font-size: 0.87rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
  }
  .role-btn.active { border-color: var(--blue); background: var(--blue-dim); color: var(--paper); }

  .player-list {
    display: flex; flex-direction: column; gap: 7px;
    width: 100%; max-height: 280px; overflow-y: auto;
  }
  .player-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 13px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    border: 1px solid var(--border);
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .p-name { font-weight: 600; font-size: 0.88rem; flex: 1; }
  .p-pts { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--gold); }

  .dots { display: flex; gap: 5px; justify-content: center; padding: 10px 0; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); animation: pulse 1.4s ease infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%,60%,100% { opacity: 0.3; transform: scale(1); }
    30% { opacity: 1; transform: scale(1.3); }
  }

  .countdown-big {
    font-family: 'Syne', sans-serif;
    font-size: 7rem; font-weight: 800;
    color: var(--blue); text-align: center;
    animation: popIn 0.3s ease; line-height: 1;
  }
  @keyframes popIn {
    from { transform: scale(1.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .q-stage {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 26px 20px 22px;
    text-align: center;
    position: relative;
  }

  .q-eyebrow { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); margin-bottom: 10px; }

  .cat-tag {
    display: inline-block;
    background: var(--blue-dim);
    border: 1px solid var(--blue-border);
    color: #6ab4e8;
    font-size: 0.68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    padding: 3px 10px; border-radius: 8px; margin-bottom: 14px;
  }

  .q-text {
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem; font-weight: 700;
    letter-spacing: -0.02em; color: var(--paper); line-height: 1.4;
  }

  .blank {
    display: inline-block; min-width: 64px;
    border-bottom: 3px solid var(--blue);
    color: var(--blue); padding: 0 4px; font-style: italic;
  }

  .timer-wrap { position: absolute; top: 12px; right: 12px; }
  .timer-wrap svg { width: 42px; height: 42px; transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 4; }
  .ring-prog { fill: none; stroke: var(--gold); stroke-width: 4; stroke-linecap: round;
    stroke-dasharray: 113; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear, stroke 0.3s; }
  .ring-num {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.82rem;
  }

  .opts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; width: 100%; }

  .opt-btn {
    padding: 13px 10px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: var(--paper);
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; gap: 8px; width: 100%;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--blue); background: var(--blue-dim); transform: translateY(-2px); }
  .opt-btn:active { transform: translateY(0); }
  .opt-btn:disabled { cursor: not-allowed; }
  .opt-btn.correct { background: rgba(42,157,92,0.2)!important; border-color: var(--green)!important; color: #5de097; }
  .opt-btn.wrong   { background: rgba(230,57,70,0.15)!important; border-color: var(--red)!important;   color: #ff8a93; }
  .opt-btn.reveal  { background: rgba(42,157,92,0.1)!important;  border-color: rgba(42,157,92,0.4)!important; color: #5de097; }

  .opt-key {
    font-family: 'DM Mono', monospace; font-size: 0.68rem;
    color: var(--muted); background: rgba(255,255,255,0.07);
    padding: 2px 6px; border-radius: 4px; flex-shrink: 0;
  }

  .flash {
    width: 100%; padding: 14px; border-radius: 13px; text-align: center;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem;
    display: none; animation: flashIn 0.3s ease;
  }
  @keyframes flashIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .flash.show { display: block; }
  .flash.win     { background: rgba(42,157,92,0.2);   border: 1px solid var(--green); color: #5de097; }
  .flash.lose    { background: rgba(230,57,70,0.15);  border: 1px solid var(--red);   color: #ff8a93; }
  .flash.neutral { background: rgba(245,166,35,0.15); border: 1px solid var(--gold);  color: var(--gold); }

  .live-board { width: 100%; display: flex; flex-direction: column; gap: 5px; }
  .board-lbl { font-family: 'DM Mono', monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 3px; }

  .board-row {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 11px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 9px; transition: all 0.3s;
  }
  .board-row.leader { background: rgba(245,166,35,0.1); border-color: rgba(245,166,35,0.3); }
  .board-row.me     { border-color: var(--blue-border); }
  .b-rank { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.82rem; width: 18px; text-align: center; color: var(--muted); }
  .b-rank.gold { color: var(--gold); }
  .b-name { font-weight: 600; font-size: 0.85rem; flex: 1; }
  .b-pts  { font-family: 'DM Mono', monospace; font-size: 0.87rem; color: var(--gold); }
  .b-chg  { font-size: 0.72rem; font-weight: 700; min-width: 34px; text-align: right; }
  .b-chg.up   { color: var(--green); }
  .b-chg.down { color: var(--red); }

  .round-tag { background: var(--blue); color: white; padding: 3px 10px; border-radius: 20px; font-size: 0.73rem; font-weight: 700; }

  .podium { display: flex; align-items: flex-end; justify-content: center; gap: 7px; width: 100%; height: 105px; }
  .pod {
    flex: 1; border-radius: 9px 9px 0 0;
    display: flex; flex-direction: column; align-items: center;
    justify-content: flex-start; padding-top: 10px;
    font-size: 0.73rem; font-weight: 700; gap: 3px;
  }
  .pod-emoji { font-size: 1.2rem; }
  .pod1 { background: rgba(245,166,35,0.2); height: 100%; border: 1px solid rgba(245,166,35,0.35); }
  .pod2 { background: rgba(255,255,255,0.07); height: 72%; border: 1px solid rgba(255,255,255,0.12); }
  .pod3 { background: rgba(255,255,255,0.04); height: 52%; border: 1px solid rgba(255,255,255,0.08); }

  .info-row { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--muted); width: 100%; }

  @media (max-width: 400px) {
    .opts-grid { grid-template-columns: 1fr; }
    .q-text { font-size: 1.1rem; }
    .countdown-big { font-size: 5rem; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">Grammar<span>Duel</span> 🧠</a>
  <div class="header-right">
    <div class="round-info" id="header-info">Clashroom</div>
    <button class="lang-btn" onclick="toggleLang()">
      <span id="lang-flag">🇳🇴</span>
      <span id="lang-txt">Norsk</span>
    </button>
  </div>
</header>

<!-- ROLE SELECT -->
<div class="screen active" id="screen-role">
  <div style="text-align:center;padding-top:16px;">
    <div style="font-size:2.8rem;margin-bottom:14px;">🧠</div>
    <h1>Grammar<em>Duel</em></h1>
    <p class="sub" id="t-subtitle"></p>
  </div>
  <div class="role-toggle">
    <button class="role-btn active" onclick="selectRole('student')" id="role-student"></button>
    <button class="role-btn" onclick="selectRole('teacher')" id="role-teacher"></button>
  </div>
  <div class="card" style="display:flex;flex-direction:column;gap:11px;">
    <input type="text" id="name-input" maxlength="20" />
    <button class="btn-primary" onclick="joinGame()" id="t-join-btn"></button>
  </div>
  <p class="sub" style="font-size:0.73rem;" id="t-share-hint"></p>
</div>

<!-- LOBBY -->
<div class="screen" id="screen-lobby">
  <h1 id="t-lobby-title"></h1>
  <p class="sub" id="lobby-count"></p>
  <div class="card" style="display:flex;flex-direction:column;gap:9px;">
    <div class="player-list" id="player-list"></div>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>
  <div id="teacher-controls" style="display:none;width:100%;flex-direction:column;gap:9px;">
    <button class="btn-green" onclick="startCountdown()" id="t-start-btn"></button>
    <div class="info-row">
      <span id="t-game-info"></span>
      <span id="player-count-label"></span>
    </div>
  </div>
</div>

<!-- COUNTDOWN -->
<div class="screen" id="screen-countdown">
  <p class="sub" id="t-get-ready"></p>
  <div class="countdown-big" id="countdown-num">3</div>
  <p class="sub" id="t-fastest-wins"></p>
</div>

<!-- GAME -->
<div class="screen" id="screen-game">
  <div style="width:100%;display:flex;justify-content:space-between;align-items:center;">
    <div class="round-tag">Q <span id="round-num">1</span>/20</div>
    <div style="font-family:'DM Mono',monospace;font-size:0.83rem;color:var(--gold)">⚡ <span id="my-score-live">0</span> pts</div>
  </div>

  <div class="q-stage">
    <div class="timer-wrap">
      <svg viewBox="0 0 44 44">
        <circle class="ring-track" cx="22" cy="22" r="18"/>
        <circle class="ring-prog" id="ring-prog" cx="22" cy="22" r="18"/>
      </svg>
      <div class="ring-num" id="ring-num">10</div>
    </div>
    <div class="q-eyebrow" id="t-q-eyebrow"></div>
    <div class="cat-tag" id="cat-tag">Articles</div>
    <div class="q-text" id="q-text"></div>
  </div>

  <div class="opts-grid" id="opts-grid"></div>
  <div class="flash" id="game-flash"></div>

  <div class="live-board">
    <div class="board-lbl" id="t-board-lbl"></div>
    <div id="live-scoreboard"></div>
  </div>
</div>

<!-- BETWEEN ROUNDS -->
<div class="screen" id="screen-between">
  <h1 id="between-title"></h1>
  <div class="flash show neutral" id="between-flash"></div>
  <div style="width:100%;display:flex;flex-direction:column;gap:5px;" id="between-board"></div>
</div>

<!-- RESULTS -->
<div class="screen" id="screen-results">
  <h1 id="t-results-title"></h1>
  <div class="podium" id="podium"></div>
  <div style="width:100%;display:flex;flex-direction:column;gap:5px;margin-top:6px;" id="final-board"></div>
  <button class="btn-primary" onclick="resetGame()" id="t-play-again"></button>
  <button class="btn-secondary" onclick="showScreen('screen-role')" id="t-change-settings"></button>
</div>

<script>
// ─── TRANSLATIONS ─────────────────────────────────────────────
const LANG = {
  no: {
    subtitle:        "Velg riktig grammatikk raskere enn resten av klassen.",
    role_student:    "🎮 Elev",
    role_teacher:    "🏫 Lærer",
    name_ph:         "Navnet ditt...",
    join_btn:        "Bli med i duellen →",
    share_hint:      "Del siden med klassen – alle bruker sin egen enhet",
    lobby_title:     "Venter på<br><em>utfordrere...</em>",
    start_btn:       "▶ Start duellen",
    game_info:       "20 spørsmål · 10 sek hvert",
    get_ready:       "Gjør deg klar...",
    fastest_wins:    "🧠 Raskest riktig svar stjeler poeng!",
    q_eyebrow:       "Velg riktig form",
    board_lbl:       "🏆 Live poengtavle",
    results_title:   "Duellen<br><em>er over!</em>",
    play_again:      "🔄 Ny duel",
    change_settings: "Endre innstillinger",
    ans_label:       "Svar:",
    last_label:      "Siste:",
    you_suffix:      " (deg)",
    players_ready:   n => `${n} spiller${n !== 1 ? 'e' : ''} klar`,
    players_count:   n => `${n} spillere`,
    header_lobby:    n => `${n} i lobbyen`,
    header_q:        (q,t) => `Q ${q}/${t}`,
    flash_correct:   pts => `✓ Riktig! +${pts} pts`,
    flash_steal:     (pts,n) => `💥 Stjal ${pts} pts fra ${n} spiller${n!==1?'e':''}!`,
    flash_wrong:     (pts,a) => `✗ Feil! −${pts} pts. Svar: ${a}`,
    flash_timeout:   a => `⏱ Tiden er ute! Svar: ${a}`,
    chg_pos:         pts => `⚡ Du fikk +${pts} pts!`,
    chg_neg:         pts => `💸 Du mistet ${pts} pts`,
    chg_none:        "⏱ Ingen endring denne runden",
    remaining:       n => `${n} spørsmål igjen...`,
    last_q:          "Siste spørsmål! Resultater straks...",
  },
  en: {
    subtitle:        "Pick the right grammar faster than the rest of the class.",
    role_student:    "🎮 Student",
    role_teacher:    "🏫 Teacher",
    name_ph:         "Your name...",
    join_btn:        "Enter the duel →",
    share_hint:      "Share this page with your class — everyone joins on their own device",
    lobby_title:     "Waiting for<br><em>challengers...</em>",
    start_btn:       "▶ Start the duel",
    game_info:       "20 questions · 10 sec each",
    get_ready:       "Get ready...",
    fastest_wins:    "🧠 Fastest correct answer steals points!",
    q_eyebrow:       "Choose the correct form",
    board_lbl:       "🏆 Live Scoreboard",
    results_title:   "Duel<br><em>Complete!</em>",
    play_again:      "🔄 New Duel",
    change_settings: "Change settings",
    ans_label:       "Answer:",
    last_label:      "Last:",
    you_suffix:      " (you)",
    players_ready:   n => `${n} player${n!==1?'s':''} ready`,
    players_count:   n => `${n} players`,
    header_lobby:    n => `${n} in lobby`,
    header_q:        (q,t) => `Q ${q}/${t}`,
    flash_correct:   pts => `✓ Correct! +${pts} pts`,
    flash_steal:     (pts,n) => `💥 Stole ${pts} pts from ${n} player${n!==1?'s':''}!`,
    flash_wrong:     (pts,a) => `✗ Wrong! −${pts} pts. Answer: ${a}`,
    flash_timeout:   a => `⏱ Time's up! Answer: ${a}`,
    chg_pos:         pts => `⚡ You earned +${pts} pts!`,
    chg_neg:         pts => `💸 You lost ${pts} pts`,
    chg_none:        "⏱ No change this round",
    remaining:       n => `${n} questions left...`,
    last_q:          "Last question! Results coming...",
  }
};

let lang = localStorage.getItem('clashroom_lang') || 'no';
const L = () => LANG[lang];

function applyLang() {
  document.documentElement.lang = lang;
  document.getElementById('lang-flag').textContent = lang === 'no' ? '🇳🇴' : '🇬🇧';
  document.getElementById('lang-txt').textContent  = lang === 'no' ? 'Norsk' : 'English';

  const set = (id, val) => { const el = document.getElementById(id); if (el) el.innerHTML = val; };
  const setTxt = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  const ph = (id, val) => { const el = document.getElementById(id); if (el) el.placeholder = val; };

  set('t-subtitle',        L().subtitle);
  setTxt('role-student',   L().role_student);
  setTxt('role-teacher',   L().role_teacher);
  ph('name-input',         L().name_ph);
  setTxt('t-join-btn',     L().join_btn);
  setTxt('t-share-hint',   L().share_hint);
  set('t-lobby-title',     L().lobby_title);
  setTxt('t-start-btn',    L().start_btn);
  setTxt('t-game-info',    L().game_info);
  setTxt('t-get-ready',    L().get_ready);
  setTxt('t-fastest-wins', L().fastest_wins);
  setTxt('t-q-eyebrow',    L().q_eyebrow);
  setTxt('t-board-lbl',    L().board_lbl);
  set('t-results-title',   L().results_title);
  setTxt('t-play-again',   L().play_again);
  setTxt('t-change-settings', L().change_settings);

  if (G.players.length > 0) renderLobby();
}

function toggleLang() {
  lang = lang === 'no' ? 'en' : 'no';
  localStorage.setItem('clashroom_lang', lang);
  applyLang();
}

// ─── QUESTION BANK ────────────────────────────────────────────
const QS = [
  { cat:"Articles",         q:"I saw ___ elephant at the zoo.",               opts:["a","an","the","—"],               a:"an"   },
  { cat:"Articles",         q:"She plays ___ piano every day.",                opts:["a","an","the","—"],               a:"the"  },
  { cat:"Articles",         q:"___ sun rises in the east.",                    opts:["A","An","The","—"],               a:"The"  },
  { cat:"Articles",         q:"He wants to be ___ engineer.",                  opts:["a","an","the","—"],               a:"an"   },
  { cat:"Articles",         q:"Can I borrow ___ pen?",                         opts:["a","an","the","—"],               a:"a"    },
  { cat:"Articles",         q:"I love ___ music she plays.",                   opts:["a","an","the","—"],               a:"the"  },
  { cat:"Present Simple",   q:"She ___ to school every day.",                  opts:["go","goes","is going","went"],    a:"goes" },
  { cat:"Present Simple",   q:"They ___ football on Sundays.",                 opts:["plays","play","is playing","played"], a:"play" },
  { cat:"Present Simple",   q:"Water ___ at 100 degrees Celsius.",             opts:["boil","boils","is boiling","boiled"], a:"boils" },
  { cat:"Present Simple",   q:"He ___ not like spinach.",                      opts:["do","does","did","is"],           a:"does" },
  { cat:"Past Simple",      q:"We ___ to London last summer.",                 opts:["go","gone","went","have gone"],   a:"went" },
  { cat:"Past Simple",      q:"She ___ a letter yesterday.",                   opts:["write","writes","written","wrote"], a:"wrote" },
  { cat:"Past Simple",      q:"He ___ his keys this morning.",                 opts:["lose","loses","has lost","lost"], a:"lost" },
  { cat:"Past Simple",      q:"I ___ a great film last night.",                opts:["see","seen","saw","have seen"],   a:"saw"  },
  { cat:"Present Perfect",  q:"I ___ never eaten sushi before.",               opts:["have","has","had","am"],          a:"have" },
  { cat:"Present Perfect",  q:"She ___ already finished her homework.",        opts:["have","has","had","is"],          a:"has"  },
  { cat:"Present Perfect",  q:"They ___ lived here for ten years.",            opts:["have","has","had","are"],         a:"have" },
  { cat:"Present Perfect",  q:"He ___ just arrived.",                          opts:["have","has","had","did"],         a:"has"  },
  { cat:"Past Perfect",     q:"She left before I ___ arrived.",                opts:["have","has","had","was"],         a:"had"  },
  { cat:"Past Perfect",     q:"By the time he called, she ___ already left.",  opts:["have","has","had","was"],         a:"had"  },
  { cat:"Future",           q:"I ___ call you tomorrow.",                      opts:["am","will","would","have"],       a:"will" },
  { cat:"Future",           q:"She ___ going to study medicine.",              opts:["is","are","was","be"],            a:"is"   },
  { cat:"Future",           q:"We ___ probably be late.",                      opts:["are","will","would","be"],        a:"will" },
  { cat:"Continuous",       q:"He ___ watching TV right now.",                 opts:["is","are","was","am"],            a:"is"   },
  { cat:"Continuous",       q:"They ___ playing outside when it started raining.", opts:["is","are","was","were"],     a:"were" },
  { cat:"Prepositions",     q:"She lives ___ Oslo.",                           opts:["in","at","on","to"],             a:"in"   },
  { cat:"Prepositions",     q:"The meeting is ___ Monday.",                    opts:["in","at","on","to"],             a:"on"   },
  { cat:"Prepositions",     q:"I wake up ___ 7 o'clock.",                      opts:["in","at","on","for"],            a:"at"   },
  { cat:"Prepositions",     q:"She's been studying ___ three hours.",          opts:["since","for","during","while"],  a:"for"  },
  { cat:"Modal Verbs",      q:"You ___ wear a seatbelt. It's the law.",        opts:["can","must","might","should"],   a:"must" },
  { cat:"Modal Verbs",      q:"You ___ eat more vegetables — just a tip.",     opts:["must","can","should","would"],   a:"should"},
  { cat:"Conditionals",     q:"If it rains tomorrow, we ___ stay inside.",     opts:["will","would","shall","are"],    a:"will" },
  { cat:"Conditionals",     q:"If I ___ a million pounds, I'd travel the world.", opts:["have","had","has","am"],     a:"had"  },
];

// ─── CONSTANTS ────────────────────────────────────────────────
const COLORS     = ['#e63946','#2176ae','#f5a623','#2a9d5c','#9b5de5','#f77f00','#4cc9f0','#e9c46a','#ef476f','#06d6a0'];
const TIME_MAX   = 10;
const ROUNDS     = 20;
const STEAL_EACH = 25;
const PENALTY    = 20;

// ─── STATE ────────────────────────────────────────────────────
const G = {
  role: 'student', myName: '', isTeacher: false,
  players: [], scores: {}, lastChange: {},
  questions: [], round: 0,
  answered: false, timeLeft: TIME_MAX, timer: null,
};

// ─── UTILS ───────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function colorFor(name) {
  let h = 0; for (const c of name) h = c.charCodeAt(0) + ((h << 5) - h);
  return COLORS[Math.abs(h) % COLORS.length];
}
function initials(name) { return name.charAt(0).toUpperCase(); }

function avHtml(name, sz = 26) {
  return `<div style="background:${colorFor(name)};width:${sz}px;height:${sz}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:${Math.round(sz*0.34)}px;flex-shrink:0;">${initials(name)}</div>`;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function updateRing(cur, max) {
  document.getElementById('ring-prog').style.strokeDashoffset = 113 - (cur / max) * 113;
}

// ─── ROLE SELECT ─────────────────────────────────────────────
function selectRole(role) {
  G.role = role;
  document.getElementById('role-student').classList.toggle('active', role === 'student');
  document.getElementById('role-teacher').classList.toggle('active', role === 'teacher');
}

function joinGame() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) { document.getElementById('name-input').focus(); return; }
  G.myName = name;
  G.isTeacher = G.role === 'teacher';
  if (!G.players.includes(name)) {
    G.players.push(name);
    G.scores[name] = 0;
    G.lastChange[name] = 0;
  }
  renderLobby();
  showScreen('screen-lobby');
  if (G.isTeacher) document.getElementById('teacher-controls').style.display = 'flex';
}

// ─── LOBBY ───────────────────────────────────────────────────
function renderLobby() {
  const list = document.getElementById('player-list');
  list.innerHTML = '';
  G.players.forEach(p => {
    const el = document.createElement('div');
    el.className = 'player-item';
    el.innerHTML = `${avHtml(p,32)}<div class="p-name">${p}</div><div class="p-pts">⚡ ${G.scores[p]||0}</div>`;
    list.appendChild(el);
  });
  const n = G.players.length;
  document.getElementById('lobby-count').textContent = L().players_ready(n);
  document.getElementById('player-count-label').textContent = L().players_count(n);
  document.getElementById('header-info').textContent = L().header_lobby(n);
}

// ─── COUNTDOWN ───────────────────────────────────────────────
function startCountdown() {
  G.questions = shuffle(QS).slice(0, ROUNDS);
  G.round = 0;
  G.players.forEach(p => { G.scores[p] = 0; G.lastChange[p] = 0; });
  showScreen('screen-countdown');
  let n = 3;
  document.getElementById('countdown-num').textContent = n;
  const iv = setInterval(() => {
    n--;
    if (n <= 0) { clearInterval(iv); startRound(); }
    else document.getElementById('countdown-num').textContent = n;
  }, 1000);
}

// ─── ROUND ───────────────────────────────────────────────────
function startRound() {
  if (G.round >= ROUNDS) { showResults(); return; }
  const q = G.questions[G.round];
  G.answered = false;
  G.timeLeft = TIME_MAX;

  document.getElementById('round-num').textContent = G.round + 1;
  document.getElementById('cat-tag').textContent = q.cat;
  document.getElementById('q-text').innerHTML = q.q.replace('___', '<span class="blank">___</span>');
  document.getElementById('game-flash').className = 'flash';
  document.getElementById('my-score-live').textContent = G.scores[G.myName] || 0;
  document.getElementById('header-info').textContent = L().header_q(G.round + 1, ROUNDS);
  document.getElementById('ring-num').textContent = TIME_MAX;

  const keys = ['1','2','3','4'];
  const grid = document.getElementById('opts-grid');
  grid.innerHTML = '';
  const opts = shuffle(q.opts);
  opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.dataset.v = opt;
    btn.innerHTML = `<span class="opt-key">${keys[i]}</span>${opt}`;
    btn.onclick = () => pick(opt, btn, q);
    grid.appendChild(btn);
  });

  renderBoard();
  showScreen('screen-game');
  updateRing(TIME_MAX, TIME_MAX);
  document.getElementById('ring-prog').style.stroke = 'var(--gold)';
  clearInterval(G.timer);
  G.timer = setInterval(() => {
    G.timeLeft--;
    document.getElementById('ring-num').textContent = G.timeLeft;
    updateRing(G.timeLeft, TIME_MAX);
    if (G.timeLeft <= 3) document.getElementById('ring-prog').style.stroke = 'var(--red)';
    else if (G.timeLeft <= 6) document.getElementById('ring-prog').style.stroke = 'var(--gold)';
    if (G.timeLeft <= 0) { clearInterval(G.timer); if (!G.answered) timeout(q); }
  }, 1000);
}

function pick(chosen, btn, q) {
  if (G.answered) return;
  clearInterval(G.timer);
  G.answered = true;
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);

  const ok = chosen.toLowerCase() === q.a.toLowerCase();
  const timeBonus = Math.round((G.timeLeft / TIME_MAX) * 60);
  const flash = document.getElementById('game-flash');

  if (ok) {
    btn.classList.add('correct');
    let gained = 100 + timeBonus;
    let stolen = 0;
    const stolenFrom = [];
    G.players.forEach(p => {
      if (p !== G.myName) {
        if ((G.scores[p] || 0) > 0) {
          const s = Math.min(STEAL_EACH, G.scores[p]);
          G.scores[p] -= s;
          G.lastChange[p] = -s;
          stolen += s;
          stolenFrom.push(p);
        } else {
          G.lastChange[p] = 0;
        }
      }
    });
    gained += stolen;
    G.scores[G.myName] = (G.scores[G.myName] || 0) + gained;
    G.lastChange[G.myName] = gained;
    flash.textContent = stolenFrom.length > 0
      ? L().flash_steal(gained, stolenFrom.length)
      : L().flash_correct(gained);
    flash.className = 'flash show win';
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt-btn').forEach(b => { if (b.dataset.v === q.a) b.classList.add('reveal'); });
    G.scores[G.myName] = Math.max(0, (G.scores[G.myName] || 0) - PENALTY);
    G.lastChange[G.myName] = -PENALTY;
    G.players.forEach(p => { if (p !== G.myName) G.lastChange[p] = 0; });
    flash.textContent = L().flash_wrong(PENALTY, q.a);
    flash.className = 'flash show lose';
  }

  document.getElementById('my-score-live').textContent = G.scores[G.myName] || 0;
  renderBoard();
  setTimeout(() => between(q.a), 1600);
}

function timeout(q) {
  G.answered = true;
  document.querySelectorAll('.opt-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.v === q.a) b.classList.add('reveal');
  });
  G.players.forEach(p => { G.lastChange[p] = 0; });
  const flash = document.getElementById('game-flash');
  flash.textContent = L().flash_timeout(q.a);
  flash.className = 'flash show neutral';
  renderBoard();
  setTimeout(() => between(q.a), 1600);
}

function renderBoard() {
  const sorted = [...G.players].sort((a, b) => (G.scores[b]||0) - (G.scores[a]||0));
  const c = document.getElementById('live-scoreboard');
  c.innerHTML = '';
  sorted.slice(0, 6).forEach((p, i) => {
    const chg = G.lastChange[p] || 0;
    const isMe = p === G.myName;
    const el = document.createElement('div');
    el.className = 'board-row' + (i===0?' leader':'') + (isMe?' me':'');
    el.innerHTML = `
      <div class="b-rank${i===0?' gold':''}">${i===0?'👑':i+1}</div>
      ${avHtml(p,24)}
      <div class="b-name">${p}${isMe ? L().you_suffix : ''}</div>
      <div class="b-pts">${G.scores[p]||0}</div>
      <div class="b-chg ${chg>0?'up':chg<0?'down':''}">${chg>0?'+'+chg:chg<0?chg:''}</div>
    `;
    c.appendChild(el);
  });
}

// ─── BETWEEN ─────────────────────────────────────────────────
function between(ans) {
  const remaining = ROUNDS - G.round - 1;
  document.getElementById('between-title').innerHTML = remaining > 0
    ? `${L().ans_label} <em>${ans}</em>`
    : `${L().last_label} <em>${ans}</em>`;

  const chg = G.lastChange[G.myName] || 0;
  const bf = document.getElementById('between-flash');
  if (chg > 0)      { bf.textContent = L().chg_pos(chg);           bf.className = 'flash show win';     }
  else if (chg < 0) { bf.textContent = L().chg_neg(Math.abs(chg)); bf.className = 'flash show lose';    }
  else              { bf.textContent = L().chg_none;                bf.className = 'flash show neutral'; }

  const sorted = [...G.players].sort((a,b) => (G.scores[b]||0)-(G.scores[a]||0));
  const board = document.getElementById('between-board');
  board.innerHTML = '';
  sorted.slice(0,6).forEach((p,i) => {
    const el = document.createElement('div');
    el.className = 'board-row' + (i===0?' leader':'');
    el.innerHTML = `
      <div class="b-rank${i===0?' gold':''}">${i===0?'👑':i+1}</div>
      ${avHtml(p,24)}
      <div class="b-name">${p}</div>
      <div class="b-pts">${G.scores[p]||0} pts</div>
    `;
    board.appendChild(el);
  });

  showScreen('screen-between');
  G.round++;
  setTimeout(() => { if (G.round >= ROUNDS) showResults(); else startRound(); }, 2500);
}

// ─── RESULTS ─────────────────────────────────────────────────
function showResults() {
  const sorted = [...G.players].sort((a,b) => (G.scores[b]||0)-(G.scores[a]||0));
  const podium = document.getElementById('podium');
  podium.innerHTML = '';
  [[1,'pod2'],[0,'pod1'],[2,'pod3']].forEach(([idx, cls]) => {
    const p = sorted[idx]; if (!p) return;
    const d = document.createElement('div');
    d.className = `pod ${cls}`;
    d.innerHTML = `<div class="pod-emoji">${['🥇','🥈','🥉'][idx]}</div><div>${p.split(' ')[0]}</div><div style="color:var(--gold);font-family:'DM Mono',monospace;font-size:0.75rem">${G.scores[p]||0}</div>`;
    podium.appendChild(d);
  });
  const fb = document.getElementById('final-board');
  fb.innerHTML = '';
  sorted.forEach((p,i) => {
    const el = document.createElement('div');
    el.className = 'board-row' + (i===0?' leader':'');
    el.innerHTML = `
      <div class="b-rank${i===0?' gold':''}">${i+1}</div>
      ${avHtml(p,28)}
      <div class="b-name">${p}</div>
      <div class="b-pts">⚡ ${G.scores[p]||0}</div>
    `;
    fb.appendChild(el);
  });
  showScreen('screen-results');
}

function resetGame() {
  G.players.forEach(p => { G.scores[p] = 0; G.lastChange[p] = 0; });
  G.round = 0;
  renderLobby();
  showScreen('screen-lobby');
}

// ─── KEYBOARD ────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const active = document.querySelector('.screen.active');
  if (!active) return;
  if (active.id === 'screen-role' && e.key === 'Enter') { joinGame(); return; }
  if (active.id === 'screen-game' && !G.answered) {
    const i = {'1':0,'2':1,'3':2,'4':3}[e.key];
    if (i !== undefined) { const bs = document.querySelectorAll('.opt-btn'); if (bs[i]) bs[i].click(); }
  }
});

// ─── INIT ────────────────────────────────────────────────────
applyLang();
</script>
